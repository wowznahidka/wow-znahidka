<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOW.ZNAHIDKA | Premium Drop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

        :root {
            --bg: #050505; --surface: #121212; --surface-light: #1a1a1a;
            --accent: #d4ff00; --text: #ffffff; --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(10, 10, 10, 0.7);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 100px; }

        /* --- ВЕЛКАМ ЕКРАН (ВИБІР СТАТІ) --- */
        #splash-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; transition: var(--transition);
        }
        .gender-split { flex: 1; display: flex; flex-direction: column; }
        .gender-btn {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1px;
            color: rgba(255,255,255,0.3); border: none; cursor: pointer; transition: var(--transition);
            background-size: cover; background-position: center; position: relative;
        }
        .gender-btn::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.6); transition: var(--transition); }
        .gender-btn span { position: relative; z-index: 2; transition: var(--transition); }
        .gender-btn:hover::before, .gender-btn:active::before { background: rgba(0,0,0,0.2); }
        .gender-btn:hover span, .gender-btn:active span { color: var(--accent); transform: scale(1.1); }
        .gender-btn.men { background-image: url('https://images.unsplash.com/photo-1608231387042-66d1773070a5?q=80&w=1000&auto=format&fit=crop'); border-bottom: 2px solid var(--border); }
        .gender-btn.women { background-image: url('https://images.unsplash.com/photo-1552346154-21d32810baa3?q=80&w=1000&auto=format&fit=crop'); }

        .logo-splash {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; font-weight: 900; z-index: 10; background: var(--bg);
            padding: 10px 20px; border-radius: 30px; border: 1px solid var(--border);
        }
        .logo-splash span { color: var(--accent); }

        /* --- ГОЛОВНИЙ ДОДАТОК --- */
        #app { display: none; opacity: 0; transition: opacity 0.5s ease; }
        
        header {
            position: sticky; top: 0; background: var(--glass); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid var(--border);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .header-actions button { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }

        /* --- ФІЛЬТРИ --- */
        .filters-bar { background: var(--bg); position: sticky; top: 62px; z-index: 990; border-bottom: 1px solid var(--border); }
        .brand-scroll { display: flex; overflow-x: auto; padding: 12px 20px; gap: 10px; scrollbar-width: none; }
        .brand-scroll::-webkit-scrollbar { display: none; }
        .chip {
            background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
            padding: 8px 18px; border-radius: 20px; font-weight: 600; font-size: 0.85rem;
            white-space: nowrap; cursor: pointer; transition: var(--transition);
        }
        .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        
        .tools-row { display: flex; justify-content: space-between; padding: 10px 20px; }
        .filter-btn { background: var(--surface-light); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 12px; font-weight: 600; font-size: 0.8rem; cursor: pointer; display: flex; gap: 6px; align-items: center; }

        /* --- СІТКА ТОВАРІВ --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px 40px; } }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; transition: var(--transition); }
        .card:active { transform: scale(0.98); }
        .img-wrap { position: relative; aspect-ratio: 1/1; background: var(--surface-light); overflow: hidden; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        /* ЗАГЛУШКА ДЛЯ ТЕЛЕГРАМУ */
        .no-photo { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; padding: 20px; text-align: center; }
        .no-photo-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.5; }
        .no-photo-text { font-size: 0.75rem; font-weight: 800; color: var(--text-dim); margin-bottom: 15px; }
        .btn-tg-req { background: rgba(36, 161, 222, 0.1); color: #24A1DE; border: 1px solid #24A1DE; padding: 8px 16px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; text-decoration: none; display: inline-block; }

        .info { padding: 15px; display: flex; flex-direction: column; flex: 1; }
        .brand { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
        .name { font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        .price { font-size: 1.2rem; font-weight: 900; color: var(--accent); margin-top: auto; }
        
        .sizes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .sz-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text-dim); font-size: 0.7rem; font-weight: 700; padding: 6px 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .sz-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .add-btn { width: 100%; background: var(--surface-light); color: var(--text); border: none; padding: 12px; border-radius: 14px; font-weight: 800; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        .add-btn.in-cart { background: var(--accent); color: var(--bg); }

        /* --- ВІКНО ФІЛЬТРІВ ТА КОШИКА (BOTTOM SHEET) --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2000; opacity: 0; pointer-events: none; transition: var(--transition); }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .sheet { position: fixed; bottom: -100%; left: 0; right: 0; background: var(--surface); border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 30px 20px; z-index: 2001; transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1); max-height: 85vh; overflow-y: auto; border-top: 1px solid var(--border); }
        .sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: var(--border); border-radius: 5px; margin: 0 auto 20px; }

        /* Сітка розмірів у фільтрі */
        .filter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .filter-grid .sz-btn { padding: 12px 0; text-align: center; font-size: 0.9rem; }

        /* Ціна у фільтрі */
        .price-inputs { display: flex; gap: 15px; margin-bottom: 30px; }
        .price-inputs input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 15px; border-radius: 14px; font-size: 1rem; font-weight: 600; outline: none; }
        .price-inputs input:focus { border-color: var(--accent); }

        .btn-main { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 18px; border-radius: 16px; font-weight: 900; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }

        /* --- ПЛАВАЮЧИЙ КОШИК --- */
        .floating-cart { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--accent); color: var(--bg); padding: 18px 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 900; z-index: 1500; cursor: pointer; box-shadow: 0 10px 30px rgba(212,255,0,0.2); transform: translateY(150%); transition: var(--transition); }
        .floating-cart.visible { transform: translateY(0); }

        /* Скелетон загрузки */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .skeleton { background: var(--surface-light); border-radius: 20px; height: 350px; animation: pulse 1.5s infinite; }
        
        .cart-item { display: flex; justify-content: space-between; padding: 15px; background: var(--bg); border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
        .del-btn { color: #ff4444; background: none; border: none; font-weight: bold; cursor: pointer; padding-left: 15px;}
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-splash">WOW<span>.</span></div>
        <div class="gender-split">
            <button class="gender-btn men" onclick="initApp('Чоловік')"><span>ЧОЛОВІКАМ</span></button>
            <button class="gender-btn women" onclick="initApp('Жінка')"><span>ЖІНКАМ</span></button>
        </div>
    </div>

    <div id="app">
        <header>
            <button class="header-actions" onclick="location.reload()">↩</button>
            <div class="logo">WOW<span>.</span>ZNAHIDKA</div>
            <button class="header-actions" onclick="openSheet('cart-sheet')">🛒</button>
        </header>

        <div class="filters-bar">
            <div class="brand-scroll" id="brands-container">
                </div>
            <div class="tools-row">
                <div style="color: var(--text-dim); font-size: 0.8rem; font-weight: 600; padding-top: 8px;" id="items-count">Завантаження...</div>
                <button class="filter-btn" onclick="openSheet('filter-sheet')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg> Фільтри
                </button>
            </div>
        </div>

        <div class="grid" id="catalog-grid">
            <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeSheets()"></div>

    <div class="sheet" id="filter-sheet">
        <div class="sheet-handle"></div>
        <h3 style="margin-bottom: 20px;">Розмір</h3>
        <div class="filter-grid" id="size-filters">
            </div>
        
        <h3 style="margin-bottom: 20px;">Ціна (грн)</h3>
        <div class="price-inputs">
            <input type="number" id="price-min" placeholder="Від" oninput="applyFilters()">
            <input type="number" id="price-max" placeholder="До" oninput="applyFilters()">
        </div>
        
        <button class="btn-main" style="background: var(--accent); color: var(--bg);" onclick="closeSheets()">ЗАСТОСУВАТИ</button>
    </div>

    <div class="sheet" id="cart-sheet">
        <div class="sheet-handle"></div>
        <div id="cart-content">
            <h2 style="margin-bottom: 20px;">Кошик</h2>
            <div id="cart-items"></div>
            <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 900; margin: 20px 0; color: var(--accent);">
                <span>Разом:</span><span id="cart-total-price">0 ₴</span>
            </div>
            <button class="btn-main" onclick="goToCheckout()">ОФОРМИТИ ЗАМОВЛЕННЯ ➔</button>
        </div>

        <div id="checkout-content" style="display: none;">
            <h2 style="margin-bottom: 20px;">Доставка (Накладний платіж)</h2>
            <input type="text" id="c-fio" class="form-input" placeholder="ПІБ отримувача" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; background:var(--bg); border:1px solid var(--border); color:white;">
            <input type="tel" id="c-phone" class="form-input" placeholder="Телефон (+380...)" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; background:var(--bg); border:1px solid var(--border); color:white;">
            <input type="text" id="c-city" class="form-input" placeholder="Місто та № Відділення НП" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; background:var(--bg); border:1px solid var(--border); color:white;">
            <input type="text" id="c-tg" class="form-input" placeholder="Твій нік в Telegram (необов'язково)" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; background:var(--bg); border:1px solid var(--border); color:white;">
            <button class="btn-main" id="btn-submit" onclick="sendOrder()" style="background: var(--accent); color: var(--bg);">ПІДТВЕРДИТИ</button>
            <div style="text-align: center; margin-top: 15px; color: var(--text-dim); font-size: 0.8rem; cursor: pointer;" onclick="goBackToCart()">← Назад в кошик</div>
        </div>
    </div>

    <div class="floating-cart" id="floating-cart" onclick="openSheet('cart-sheet')">
        <span id="float-count">1 ПАР</span>
        <span id="float-sum">2500 ₴ ➔</span>
    </div>

    <script>
        // ==========================================
        // 🚀 ТВІЙ КЛЮЧ ВІД СЕРВЕРА (ОНОВИ ЦЕ ПОСИЛАННЯ!)
        // ==========================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbx-Z8U9xDNV6Y2vZQvu9XfAxx0_PWanARk1Tgaq5JZ8hLXXR3EGyyKbDwGoyY7U_bxjEA/exec'; 
        
        let db = [], currentData = [], cart = [];
        let activeGender = '', activeBrand = 'Всі', activeSize = null;

        // 1. ІНІЦІАЛІЗАЦІЯ ПІСЛЯ ВИБОРУ СТАТІ
        async function initApp(gender) {
            activeGender = gender;
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                setTimeout(() => document.getElementById('app').style.opacity = '1', 50);
            }, 300);

            try {
                // Додаємо timestamp, щоб обходити жорсткий кеш браузера (але кеш скрипта працює)
                const response = await fetch(API_URL + "?v=" + Date.now());
                db = await response.json();
                
                currentData = db.filter(item => item.gender === activeGender);
                setupFilters();
                applyFilters();
            } catch(e) {
                document.getElementById('catalog-grid').innerHTML = `<div style="grid-column: 1/-1; text-align:center; color: #ff4444; padding: 40px;">Помилка з'єднання з сервером. Оновіть сторінку.</div>`;
            }
        }

        // 2. НАЛАШТУВАННЯ ФІЛЬТРІВ (Бренди та Розміри)
        function setupFilters() {
            // Бренди
            const brands = ['Всі', ...new Set(currentData.map(p => p.brand))].sort();
            document.getElementById('brands-container').innerHTML = brands.map(b => 
                `<div class="chip ${b === 'Всі' ? 'active' : ''}" onclick="setBrand('${b}', this)">${b}</div>`
            ).join('');

            // Розміри (сітка від 36 до 46)
            let sizesHTML = '';
            for(let i = 36; i <= 46; i++) {
                sizesHTML += `<div class="sz-btn" id="fsz-${i}" onclick="toggleSizeFilter('${i}')">${i}</div>`;
            }
            document.getElementById('size-filters').innerHTML = sizesHTML;
        }

        function setBrand(brand, el) {
            activeBrand = brand;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            applyFilters();
        }

        function toggleSizeFilter(size) {
            if(activeSize === size) {
                activeSize = null;
                document.getElementById(`fsz-${size}`).classList.remove('active');
            } else {
                document.querySelectorAll('#size-filters .sz-btn').forEach(btn => btn.classList.remove('active'));
                activeSize = size;
                document.getElementById(`fsz-${size}`).classList.add('active');
            }
            applyFilters();
        }

        // 3. ФІЛЬТРАЦІЯ ТА ВІДОБРАЖЕННЯ
        function applyFilters() {
            let filtered = currentData;
            
            if(activeBrand !== 'Всі') {
                filtered = filtered.filter(p => p.brand === activeBrand);
            }
            if(activeSize) {
                filtered = filtered.filter(p => p.sizes.includes(activeSize));
            }
            
            const min = parseInt(document.getElementById('price-min').value) || 0;
            const max = parseInt(document.getElementById('price-max').value) || 99999;
            filtered = filtered.filter(p => p.price >= min && p.price <= max);

            document.getElementById('items-count').innerText = `Знайдено: ${filtered.length}`;
            renderGrid(filtered);
        }

        function renderGrid(data) {
            const grid = document.getElementById('catalog-grid');
            if(data.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px; color:var(--text-dim);">Нічого не знайдено 🕵️‍♂️</div>`;
                return;
            }

            grid.innerHTML = data.map(p => {
                // Перевірка на відсутність фото (Заглушка)
                const isNoPhoto = !p.image || p.image.includes('t.me');
                let imageHTML = isNoPhoto 
                    ? `<div class="no-photo">
                         <div class="no-photo-icon">📷</div>
                         <div class="no-photo-text">ФОТО ОЧІКУЄТЬСЯ</div>
                         <a href="https://t.me/znahidkawow" target="_blank" class="btn-tg-req">ЗАПРОСИТИ В TG</a>
                       </div>`
                    : `<img src="${p.image}" loading="lazy" alt="${p.name}">`;

                // Кнопки розмірів для картки
                const sizesArr = p.sizes.split(',').map(s => s.trim()).filter(s=>s);
                const sizesHTML = sizesArr.map(s => {
                    const cleanSize = s.split('(')[0]; // Беремо тільки "38" з "38(24.5см)"
                    return `<button class="sz-btn" id="sz-${p.id}-${cleanSize}" onclick="selectSize('${p.id}', '${cleanSize}', '${s}', this)">${cleanSize}</button>`;
                }).join('');

                return `
                <div class="card">
                    <div class="img-wrap">${imageHTML}</div>
                    <div class="info">
                        <div class="brand">${p.brand}</div>
                        <div class="name">${p.name}</div>
                        <div class="sizes" id="szbox-${p.id}">${sizesHTML}</div>
                        <div class="price">${p.price} ₴</div>
                        <button class="add-btn" id="add-${p.id}" onclick="addToCart('${p.id}', '${p.name}', ${p.price}, '${p.image}')">ВИБЕРІТЬ РОЗМІР</button>
                    </div>
                </div>`;
            }).join('');
        }

        // 4. ЛОГІКА КОШИКА
        let selectedSizes = {}; // { productId: "38(24.5см)" }

        function selectSize(id, numOnly, fullSizeText, btn) {
            selectedSizes[id] = fullSizeText;
            document.querySelectorAll(`#szbox-${id} .sz-btn`).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const addBtn = document.getElementById(`add-${id}`);
            addBtn.innerText = 'ДОДАТИ В КОШИК';
            addBtn.style.background = 'var(--text)';
            addBtn.style.color = 'var(--bg)';
        }

        function addToCart(id, name, price, img) {
            if(!selectedSizes[id]) { alert('Спочатку виберіть розмір!'); return; }
            
            const size = selectedSizes[id];
            cart.push({ id: id + size, name: name, size: size, price: price, img: img });
            
            const addBtn = document.getElementById(`add-${id}`);
            addBtn.innerText = 'У КОШИКУ ✅';
            addBtn.classList.add('in-cart');
            
            updateCartUI();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.id !== cartId);
            updateCartUI();
        }

        function updateCartUI() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            // Плаваюча кнопка
            const floater = document.getElementById('floating-cart');
            if(cart.length > 0) {
                floater.classList.add('visible');
                document.getElementById('float-count').innerText = `${cart.length} ПАР`;
                document.getElementById('float-sum').innerText = `${total} ₴ ➔`;
            } else {
                floater.classList.remove('visible');
            }

            // Внутрішність кошика
            document.getElementById('cart-total-price').innerText = `${total} ₴`;
            const list = document.getElementById('cart-items');
            
            if(cart.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--text-dim);">Кошик порожній</div>`;
                return;
            }

            list.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div style="flex:1;">
                        <div style="font-size:0.8rem; font-weight:700; margin-bottom:5px;">${item.name}</div>
                        <div style="color:var(--accent); font-size:0.85rem; font-weight:900;">Р-р: ${item.size}</div>
                    </div>
                    <div style="font-weight:900;">${item.price} ₴</div>
                    <button class="del-btn" onclick="removeFromCart('${item.id}')">✕</button>
                </div>
            `).join('');
        }

        // 5. ВІКНА ТА ВІДПРАВКА (BOTTOM SHEETS)
        function openSheet(id) {
            document.getElementById('overlay').classList.add('active');
            document.getElementById(id).classList.add('active');
            if(id === 'cart-sheet') updateCartUI();
        }
        
        function closeSheets() {
            document.getElementById('overlay').classList.remove('active');
            document.querySelectorAll('.sheet').forEach(s => s.classList.remove('active'));
            setTimeout(goBackToCart, 400); // Скидаємо форму при закритті
        }

        function goToCheckout() {
            if(cart.length === 0) { alert('Кошик порожній!'); return; }
            document.getElementById('cart-content').style.display = 'none';
            document.getElementById('checkout-content').style.display = 'block';
        }
        
        function goBackToCart() {
            document.getElementById('checkout-content').style.display = 'none';
            document.getElementById('cart-content').style.display = 'block';
        }

        async function sendOrder() {
            const btn = document.getElementById('btn-submit');
            const fio = document.getElementById('c-fio').value.trim();
            const phone = document.getElementById('c-phone').value.trim();
            const city = document.getElementById('c-city').value.trim();
            
            if(!fio || !phone || !city) { alert('Будь ласка, заповніть обов\'язкові поля!'); return; }
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            const itemsStr = cart.map(i => `- ${i.name} (${i.size})`).join('\n');
            
            const data = {
                action: "new_order", fio: fio, phone: phone, city: city, 
                socialNick: document.getElementById('c-tg').value,
                delivery: "Нова Пошта (Накладний платіж)",
                items: itemsStr, total: total + " ₴"
            };

            btn.innerText = "ОБРОБКА...";
            btn.style.opacity = "0.7";

            try {
                // Відправляємо no-cors щоб браузер не блокував запит
                await fetch(API_URL, { 
                    method: 'POST', mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain' }, 
                    body: JSON.stringify(data) 
                });
                
                document.getElementById('checkout-content').innerHTML = `
                    <div style="text-align:center; padding:40px 0;">
                        <div style="font-size:3rem; margin-bottom:20px;">✅</div>
                        <h2 style="color:var(--accent); margin-bottom:10px;">Замовлення прийнято!</h2>
                        <p style="color:var(--text-dim); line-height:1.5;">Менеджер зв'яжеться з вами найближчим часом для підтвердження.</p>
                        <button class="btn-main" style="margin-top:30px;" onclick="location.reload()">НА ГОЛОВНУ</button>
                    </div>`;
                cart = []; updateCartUI();
            } catch(e) {
                alert("Сталася помилка. Спробуйте ще раз або напишіть нам в Telegram.");
                btn.innerText = "ПІДТВЕРДИТИ"; btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
