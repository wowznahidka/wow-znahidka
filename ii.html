<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOW.ZNAHIDKA | Premium Sneakers Boutique 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           🎨 CSS VARIABLES & THEME
           ============================================================ */
        :root {
            --accent: #d4ff00;
            --accent-soft: rgba(212, 255, 0, 0.15);
            --bg: #050505;
            --surface: #111111;
            --surface-light: #181818;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #888888;
            --glass: rgba(10, 10, 10, 0.85);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ============================================================
           RESET & GLOBAL STYLES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* ============================================================
           ✨ ANIMATIONS
           ============================================================ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseAccent {
            0% { box-shadow: 0 0 0 0 rgba(212, 255, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(212, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 255, 0, 0); }
        }

        /* ============================================================
           🚪 SPLASH SCREEN (GENDER CHOICE)
           ============================================================ */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            transition: all 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }

        .splash-logo-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: #000;
            padding: 20px 45px;
            border-radius: 60px;
            border: 1px solid var(--border);
            text-align: center;
            pointer-events: none;
            box-shadow: 0 0 60px rgba(212, 255, 0, 0.1);
        }

        .splash-logo-box h1 { font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; }
        .splash-logo-box span { color: var(--accent); }

        .gender-option {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            outline: none;
        }

        .gender-option::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            transition: var(--transition);
            z-index: 1;
        }

        .gender-option:hover::before { background: rgba(0,0,0,0.4); }

        .gender-option span {
            position: relative;
            z-index: 2;
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
        }

        .gender-option:hover span { transform: scale(1.1); color: var(--accent); }

        .men-panel { background: url('https://images.unsplash.com/photo-1608231387042-66d1773070a5?q=80&w=1000') center/cover; border-bottom: 1px solid var(--border); }
        .women-panel { background: url('https://images.unsplash.com/photo-1543163521-1bf539c55dd2?q=80&w=1000') center/cover; }

        /* ============================================================
           📱 LAYOUT & HEADER
           ============================================================ */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-logo { font-weight: 900; font-size: 1.2rem; }
        .header-logo span { color: var(--accent); }

        .cart-trigger {
            position: relative;
            cursor: pointer;
            padding: 5px;
        }

        #cart-badge {
            position: absolute;
            top: -5px;
            right: -8px;
            background: var(--accent);
            color: #000;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 8px;
            box-shadow: 0 0 15px var(--accent-soft);
        }

        /* ============================================================
           🔍 SEARCH & CATEGORIES
           ============================================================ */
        .controls-area {
            padding: 15px 20px;
            background: var(--bg);
            position: sticky;
            top: 55px; /* adjust for header height */
            z-index: 995;
        }

        .search-wrap { display: flex; gap: 10px; margin-bottom: 15px; }
        
        .main-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 18px;
            color: #fff;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .main-input:focus { border-color: var(--accent); background: var(--surface-light); }

        .filter-toggle-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
        }

        .brand-scroller {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .brand-scroller::-webkit-scrollbar { display: none; }

        .brand-chip {
            background: var(--surface);
            border: 1px solid transparent;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dim);
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
        }

        .brand-chip.active { background: var(--accent); color: #000; }

        /* ============================================================
           👟 CATALOG GRID & CARDS
           ============================================================ */
        .grid-wrapper {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 10px 15px 120px;
        }

        @media (min-width: 768px) {
            .grid-wrapper { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px 40px 140px; }
        }

        .sneaker-card {
            background: var(--surface);
            border-radius: 28px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.7s ease backwards;
            transition: var(--transition);
        }

        .sneaker-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .card-img-box {
            position: relative;
            aspect-ratio: 1/1;
            background: #141414;
            overflow: hidden;
            cursor: zoom-in;
        }

        .card-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .sneaker-card:hover .card-img-box img { transform: scale(1.08); }

        .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
        
        .card-brand {
            font-size: 0.6rem;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.35;
            height: 2.7em;
            overflow: hidden;
            color: #efefef;
        }

        .size-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }

        .mini-size-tag {
            font-size: 0.65rem;
            font-weight: 800;
            background: var(--surface-light);
            padding: 4px 8px;
            border-radius: 6px;
            color: #666;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .card-price { font-size: 1.15rem; font-weight: 900; color: #fff; }

        .size-trigger-btn {
            background: var(--accent);
            color: #000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .size-trigger-btn.in-cart { background: #fff; transform: rotate(90deg); }

        .live-photo-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            background: rgba(42, 171, 238, 0.05);
            color: #2AABEE;
            font-size: 0.75rem;
            font-weight: 800;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid rgba(42, 171, 238, 0.1);
        }

        /* ============================================================
           🔥 WOW.MATCH (TINDER MODE)
           ============================================================ */
        .match-page { display: none; padding: 20px; text-align: center; }
        
        .tinder-stack {
            position: relative;
            height: 65vh;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            perspective: 1000px;
        }

        .tinder-card {
            position: absolute;
            inset: 0;
            border-radius: 35px;
            background: var(--surface);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.5s, opacity 0.5s;
            cursor: grab;
        }

        .tinder-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .tinder-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 25px 25px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            text-align: left;
        }

        .swipe-actions {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
        }

        .action-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        .action-btn.dislike { border: 2px solid #ff4444; color: #ff4444; }
        .action-btn.like { border: 2px solid var(--accent); color: var(--accent); }

        /* ============================================================
           📐 BOTTOM SHEETS (SIZE, CART, FILTERS)
           ============================================================ */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: #0d0d0d;
            border-radius: 40px 40px 0 0;
            padding: 35px 25px;
            z-index: 2005;
            transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
            border-top: 1px solid var(--border);
        }

        .sheet.active { bottom: 0; }

        .sheet-handle {
            width: 50px;
            height: 5px;
            background: #333;
            border-radius: 10px;
            margin: 0 auto 30px;
        }

        /* Multi-Size Grid inside Sheet */
        .size-selection-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .size-item-box {
            background: #161616;
            border: 1px solid var(--border);
            padding: 18px 5px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            font-weight: 800;
            color: #666;
            transition: 0.2s;
        }

        .size-item-box.selected {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        /* ============================================================
           🛍️ CART UI
           ============================================================ */
        .cart-item-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-row img { width: 70px; height: 70px; border-radius: 18px; object-fit: cover; }
        
        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
        .cart-item-meta { font-size: 0.75rem; color: var(--accent); font-weight: 800; }

        .btn-qty {
            background: var(--surface-light);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
        }

        .checkout-summary {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
        }

        .price-summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 25px;
        }

        /* ============================================================
           🚚 CHECKOUT FORM
           ============================================================ */
        .segmented-control {
            display: flex;
            background: #161616;
            padding: 5px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .segment-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: none;
            color: #666;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .segment-btn.active { background: var(--accent); color: #000; }

        .form-field { margin-bottom: 15px; }
        .form-field input {
            width: 100%;
            background: #161616;
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 18px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .form-field input:focus { border-color: var(--accent); }

        .order-confirm-btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 22px;
            border-radius: 22px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 30px var(--accent-soft);
        }

        /* ============================================================
           🧭 BOTTOM NAVIGATION (TABS)
           ============================================================ */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 15px 10px 35px;
            border-top: 1px solid var(--border);
            z-index: 1000;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #555;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-item.active { color: var(--accent); }
        .tab-item i { font-style: normal; font-size: 1.6rem; margin-bottom: 2px; }

        /* Floating Cart Panel */
        #floating-cart-panel {
            position: fixed;
            bottom: 105px;
            left: 15px;
            right: 15px;
            background: var(--accent);
            color: #000;
            padding: 20px 25px;
            border-radius: 25px;
            display: none;
            justify-content: space-between;
            align-items: center;
            font-weight: 900;
            z-index: 900;
            box-shadow: 0 15px 45px rgba(212, 255, 0, 0.2);
            cursor: pointer;
            animation: fadeInUp 0.5s ease;
        }

        /* ============================================================
           🖼️ ZOOM VIEW
           ============================================================ */
        #zoom-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 20000;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        #zoom-overlay img { max-width: 96%; max-height: 88vh; border-radius: 15px; box-shadow: var(--shadow); }

    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo-box"><h1>WOW<span>.</span>ZNAHIDKA</h1></div>
        <button class="gender-option men-panel" onclick="initStore('Чоловік')"><span>ЧОЛОВІКАМ</span></button>
        <button class="gender-option women-panel" onclick="initStore('Жінка')"><span>ЖІНКАМ</span></button>
    </div>

    <header>
        <div class="header-logo">WOW<span>.</span>ZNAHIDKA</div>
        <div class="cart-trigger" onclick="openSheet('cart-sheet')">
            <span style="font-size: 1.6rem;">🛒</span>
            <span id="cart-badge">0</span>
        </div>
    </header>

    <main>
        <section id="page-home" class="page active">
            <div class="controls-area">
                <div class="search-wrap">
                    <input type="text" id="searchInput" class="main-input" placeholder="Яку модель шукаєте?" oninput="runGlobalFilter()">
                    <button class="filter-toggle-btn" onclick="openSheet('filter-sheet')">⚙️</button>
                </div>
                <div class="brand-scroller" id="brand-chips-cont">
                    <div class="brand-chip active" onclick="setBrand('all', this)">Всі бренди</div>
                </div>
            </div>

            <div class="grid-wrapper" id="sneaker-grid">
                </div>
            <div id="infinite-scroll-anchor" style="height: 20px;"></div>
        </section>

        <section id="page-match" class="page match-page">
            <div style="padding-top: 10px;">
                <h2 style="font-weight: 900; font-size: 1.6rem;">WOW.MATCH 🔥</h2>
                <p style="color: #444; font-size: 0.75rem; margin-top: 5px;">Знайди свою ідеальну пару свайпом</p>
            </div>
            
            <div class="tinder-stack" id="tinder-stack">
                </div>

            <div class="swipe-actions">
                <button class="action-btn dislike" onclick="swipeAction('left')">✕</button>
                <button class="action-btn like" onclick="swipeAction('right')">❤</button>
            </div>
        </section>

        <section id="page-catalog" class="page">
            <div style="padding: 25px;">
                <h2 style="font-weight: 900; margin-bottom: 20px;">Каталог брендів</h2>
                <div id="full-brand-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    </div>
            </div>
        </section>
    </main>

    <div id="floating-cart-panel" onclick="openSheet('cart-sheet')">
        <span id="float-qty-text">0 ПАР</span>
        <span id="float-sum-text">0 ₴ ОФОРМИТИ ➔</span>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="switchTab('home', this)"><i>🏠</i>Головна</div>
        <div class="tab-item" onclick="switchTab('match', this)"><i>🔥</i>Match</div>
        <div class="tab-item" onclick="switchTab('catalog', this)"><i>🔎</i>Каталог</div>
        <div class="tab-item" onclick="openSheet('contacts-sheet')"><i>💬</i>Контакти</div>
    </nav>

    <div class="overlay" id="global-overlay" onclick="closeSheets()"></div>

    <div class="sheet" id="size-picker-sheet">
        <div class="sheet-handle"></div>
        <h2 id="size-sheet-title" style="margin-bottom: 8px;">Оберіть розмір</h2>
        <p id="size-sheet-sub" style="color: #555; font-size: 0.85rem; margin-bottom: 25px;"></p>
        <div class="size-selection-grid" id="sizes-options-cont"></div>
        <button class="order-confirm-btn" onclick="commitSizesToCart()">ДОДАТИ В КОШИК</button>
    </div>

    <div class="sheet" id="cart-sheet">
        <div class="sheet-handle"></div>
        <div id="cart-main-view">
            <h2 style="margin-bottom: 20px;">Твій вибір</h2>
            <div id="cart-list-cont"></div>
            <div class="checkout-summary">
                <div class="price-summary-row">
                    <span>Разом:</span><span id="cart-total-display" style="color: var(--accent);">0 ₴</span>
                </div>
                <button class="order-confirm-btn" style="background: #fff; color: #000;" onclick="goStep2()">ПРОДОВЖИТИ ➔</button>
            </div>
        </div>
        <div id="cart-checkout-view" style="display: none;">
            <h2 style="margin-bottom: 20px;">Оформлення</h2>
            <div class="form-field"><input type="text" id="inp-fio" placeholder="ПІБ отримувача"></div>
            <div class="form-field"><input type="tel" id="inp-phone" placeholder="Номер телефону (+380...)"></div>
            <div class="form-field"><input type="text" id="inp-city" placeholder="Місто"></div>
            <div class="segmented-control">
                <button class="segment-btn active" id="btn-vidd" onclick="setLogistics('Відділення')">Відділення</button>
                <button class="segment-btn" id="btn-post" onclick="setLogistics('Поштомат')">Поштомат</button>
            </div>
            <div class="form-field"><input type="text" id="inp-np" placeholder="№ Відділення / Поштомату"></div>
            <div class="form-field"><input type="text" id="inp-promo" placeholder="Промокод (якщо є)"></div>
            <button class="order-confirm-btn" id="final-btn" onclick="submitFinalOrder()">ЗАМОВИТИ ЗАРАЗ</button>
            <p style="text-align: center; margin-top: 20px; color: #555; cursor: pointer; font-weight: 700;" onclick="goStep1()">← Назад до кошика</p>
        </div>
    </div>

    <div class="sheet" id="contacts-sheet">
        <div class="sheet-handle"></div>
        <h2 style="text-align: center; margin-bottom: 30px;">WOW.ZNAHIDKA</h2>
        <a href="https://t.me/znahidkawow" target="_blank" style="text-decoration:none; display:flex; align-items:center; gap:15px; background:#24A1DE; padding:22px; border-radius:22px; color:white; font-weight:800; margin-bottom:12px;"><i>✈️</i> Telegram Канал</a>
        <a href="https://www.instagram.com/wow.znahidka" target="_blank" style="text-decoration:none; display:flex; align-items:center; gap:15px; background:linear-gradient(45deg, #f09433, #bc1888); padding:22px; border-radius:22px; color:white; font-weight:800; margin-bottom:12px;"><i>📸</i> Instagram</a>
        <a href="https://www.tiktok.com/@wow.znahidka" target="_blank" style="text-decoration:none; display:flex; align-items:center; gap:15px; background:#000; border: 1px solid var(--border); padding:22px; border-radius:22px; color:white; font-weight:800;"><i>🎵</i> TikTok</a>
        <span style="display:block; text-align:center; color:#333; margin-top:30px; font-weight:800; cursor:pointer;" onclick="closeSheets()">ЗАКРИТИ</span>
    </div>

    <div id="zoom-overlay" onclick="this.style.display='none'"><img id="zoom-img" src=""></div>

    <script>
        // --- CONFIG & GLOBAL VARS ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbx-Z8U9xDNV6Y2vZQvu9XfAxx0_PWanARk1Tgaq5JZ8hLXXR3EGyyKbDwGoyY7U_bxjEA/exec';
        
        let allData = [];      // Всі товари з бази
        let filteredData = []; // Поточні товари після фільтрації
        let cart = [];         // Кошик
        let activeGender = ''; // Обрана стать
        let curBrand = 'all';  // Обраний бренд
        let priceCap = 5000;   // Ліміт ціни
        let itemsLimit = 12;   // Пагінація
        let promoMap = {};     // Промокоди
        let deliveryType = 'Відділення';
        
        let activeProductId = null; // Для вибору розміру
        let tempSelectedSizes = []; // Масив для мульти-вибору
        let tinderIndex = 0;

        // --- 1. STARTUP ---
        async function initStore(gender) {
            activeGender = gender;
            
            // Hide Splash
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            splash.style.transform = 'scale(1.1)';
            setTimeout(() => splash.style.display = 'none', 800);

            try {
                // Fetch data with Cache Buster
                const res = await fetch(API_URL + "?v=" + Date.now());
                const json = await res.json();
                
                allData = json.products || json;
                promoMap = json.promo || {};

                // Filter by gender immediately
                filteredData = allData.filter(p => p.gender === activeGender);
                
                initFilters();
                renderCatalog();
                renderTinder();
                setupInfiniteScroll();
                
                console.log("Store ready for:", gender);
            } catch(e) {
                alert("Помилка завантаження бази даних. Спробуйте ще раз.");
            }
        }

        // --- 2. RENDERERS ---
        function renderCatalog(append = false) {
            const grid = document.getElementById('sneaker-grid');
            if(!append) grid.innerHTML = "";
            
            const slice = filteredData.slice(append ? grid.children.length : 0, append ? grid.children.length + 12 : 12);
            
            const html = slice.map(p => {
                const sizesArr = (p.sizes || "").toString().split(',').map(s => s.trim()).filter(s => s);
                const sizesPreview = sizesArr.slice(0, 3).map(s => `<span class="mini-size-tag">${s.split('(')[0]}</span>`).join('');

                return `
                <div class="sneaker-card">
                    <div class="card-img-box" onclick="zoom('${p.image}')">
                        <img src="${p.image}" loading="lazy">
                    </div>
                    <div class="card-body">
                        <div class="card-brand">${p.brand}</div>
                        <div class="card-title">${p.name}</div>
                        <div class="size-preview">${sizesPreview}${sizesArr.length > 3 ? '...' : ''}</div>
                        <div class="card-footer">
                            <span class="card-price">${p.price} ₴</span>
                            <button class="size-trigger-btn" id="btn-${p.id}" onclick="openSizePicker('${p.id}')">+</button>
                        </div>
                        <a href="https://t.me/znahidkawow?text=${encodeURIComponent('Привіт! Можна живі фото моделі: ' + p.name)}" target="_blank" class="live-photo-link">📷 Живі фото</a>
                    </div>
                </div>`;
            }).join('');

            grid.innerHTML += html;
        }

        // --- 3. FILTER LOGIC ---
        function initFilters() {
            const brands = [...new Set(filteredData.map(p => p.brand))].sort();
            const cont = document.getElementById('brand-chips-cont');
            const list = document.getElementById('full-brand-list');
            
            brands.forEach(b => {
                const chip = document.createElement('div');
                chip.className = 'brand-chip';
                chip.innerText = b;
                chip.onclick = (e) => setBrand(b, e.target);
                cont.appendChild(chip);

                const card = document.createElement('div');
                card.style.cssText = "background:var(--surface); padding:20px; border-radius:18px; border:1px solid var(--border); text-align:center; font-weight:900; cursor:pointer;";
                card.innerText = b;
                card.onclick = () => { setBrand(b, chip); switchTab('home', document.querySelectorAll('.tab-item')[0]); };
                list.appendChild(card);
            });
        }

        function setBrand(brand, el) {
            document.querySelectorAll('.brand-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            curBrand = brand;
            runGlobalFilter();
        }

        function runGlobalFilter() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            
            filteredData = allData.filter(p => {
                const matchGender = p.gender === activeGender;
                const matchBrand = curBrand === 'all' || p.brand === curBrand;
                const matchPrice = p.price <= priceCap;
                const matchSearch = q === "" || p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q);
                return matchGender && matchBrand && matchPrice && matchSearch;
            });

            // NB 530 Priority Sorting
            filteredData.sort((a,b) => a.name.includes("NB 530") ? -1 : 1);

            renderCatalog();
            window.scrollTo(0,0);
        }

        function updatePriceLimit(v) {
            document.getElementById('price-label').innerText = v;
            priceCap = parseInt(v);
            runGlobalFilter();
        }

        // --- 4. MULTI-SIZE PICKER ---
        function openSizePicker(id) {
            activeProductId = id;
            tempSelectedSizes = [];
            const p = allData.find(x => x.id === id);
            
            document.getElementById('size-sheet-title').innerText = p.name;
            document.getElementById('size-sheet-sub').innerText = p.brand + " | Оберіть один або кілька розмірів";
            
            const sizesArr = p.sizes.split(',').map(s => s.trim()).filter(s => s);
            const cont = document.getElementById('sizes-options-cont');
            
            cont.innerHTML = sizesArr.map(s => `
                <div class="size-item-box" onclick="toggleSizeInList(this, '${s}')">
                    ${s.split('(')[0]}
                    <div style="font-size:0.5rem; opacity:0.5;">${s.includes('(') ? s.split('(')[1].replace(')','') : ''}</div>
                </div>
            `).join('');

            openSheet('size-picker-sheet');
        }

        function toggleSizeInList(el, sz) {
            const pos = tempSelectedSizes.indexOf(sz);
            if(pos > -1) {
                tempSelectedSizes.splice(pos, 1);
                el.classList.remove('selected');
            } else {
                tempSelectedSizes.push(sz);
                el.classList.add('selected');
            }
        }

        function commitSizesToCart() {
            if(!tempSelectedSizes.length) return alert("Оберіть розмір!");
            
            const product = allData.find(p => p.id === activeProductId);
            
            tempSelectedSizes.forEach(sz => {
                cart.push({
                    uid: Date.now() + Math.random(),
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    size: sz,
                    img: product.image
                });
            });

            // Animation Feedback
            const btn = document.getElementById(`btn-${activeProductId}`);
            if(btn) {
                btn.classList.add('in-cart');
                btn.innerText = '✓';
                setTimeout(() => { btn.classList.remove('in-cart'); btn.innerText = '+'; }, 1000);
            }

            closeSheets();
            updateCartUI();
        }

        // --- 5. CART & ORDER LOGIC ---
        function updateCartUI() {
            const count = cart.length;
            document.getElementById('cart-badge').innerText = count;
            
            const panel = document.getElementById('floating-cart-panel');
            if(count > 0) {
                panel.style.display = 'flex';
                document.getElementById('float-qty-text').innerText = `${count} ${getDeclension(count)}`;
                const sum = cart.reduce((a, b) => a + parseInt(b.price), 0);
                document.getElementById('float-sum-text').innerText = `${sum} ₴ ОФОРМИТИ ➔`;
            } else {
                panel.style.display = 'none';
            }
        }

        function renderCartItems() {
            const cont = document.getElementById('cart-list-cont');
            if(!cart.length) {
                cont.innerHTML = `<div style="text-align:center; padding:40px; color:#444; font-weight:700;">Кошик порожній 🛒</div>`;
                return;
            }

            cont.innerHTML = cart.map((item, idx) => `
                <div class="cart-item-row">
                    <img src="${item.img}">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-meta">Розмір: ${item.size}</div>
                    </div>
                    <div style="font-weight:900; margin-right:10px;">${item.price} ₴</div>
                    <button class="btn-qty" style="background:#300; color:#f44;" onclick="removeCartItem(${idx})">✕</button>
                </div>
            `).join('');

            const sum = cart.reduce((a, b) => a + parseInt(b.price), 0);
            document.getElementById('cart-total-display').innerText = sum + " ₴";
        }

        function removeCartItem(idx) {
            cart.splice(idx, 1);
            renderCartItems();
            updateCartUI();
            if(!cart.length) closeSheets();
        }

        async function submitFinalOrder() {
            const fio = document.getElementById('inp-fio').value.trim();
            const phone = document.getElementById('inp-phone').value.trim();
            const city = document.getElementById('inp-city').value.trim();
            const np = document.getElementById('inp-np').value.trim();
            const promo = document.getElementById('inp-promo').value.toUpperCase().trim();

            if(!fio || !phone || !np) return alert("Будь ласка, заповніть обов'язкові поля!");

            const btn = document.getElementById('final-btn');
            btn.innerText = "ОБРОБКА...";
            btn.disabled = true;

            let total = cart.reduce((a, b) => a + parseInt(b.price), 0);
            if(promo && promoMap[promo]) {
                const disc = promoMap[promo];
                total = disc < 1 ? total * (1 - disc) : total - disc;
            }

            const payload = {
                action: "new_order",
                fio, phone, city,
                delivery: `${deliveryType} №${np}`,
                items: cart.map(i => `${i.name} (${i.size})`).join(', '),
                total: Math.round(total) + " ₴",
                promo: promo || "Немає"
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('cart-checkout-view').innerHTML = `
                    <div style="text-align:center; padding:40px 0;">
                        <div style="font-size:4rem; margin-bottom:20px;">✅</div>
                        <h2 style="color:var(--accent); margin-bottom:10px;">Дякуємо!</h2>
                        <p style="color:#555; line-height:1.6;">Замовлення прийнято. Менеджер зв'яжеться з вами найближчим часом.</p>
                        <button class="order-confirm-btn" style="margin-top:30px;" onclick="location.reload()">НА ГОЛОВНУ</button>
                    </div>`;
                cart = []; updateCartUI();
            } catch(e) {
                alert("Помилка відправки. Напишіть нам у Telegram.");
                btn.innerText = "ЗАМОВИТИ ЗАРАЗ"; btn.disabled = false;
            }
        }

        // --- 6. WOW.MATCH (TINDER) LOGIC ---
        function renderTinder() {
            const stack = document.getElementById('tinder-stack');
            const pool = db.slice(tinderIndex, tinderIndex + 5);
            
            stack.innerHTML = pool.map((p, i) => `
                <div class="tinder-card" style="z-index:${10-i}; transform: scale(${1 - i*0.05}) translateY(${i*15}px)">
                    <img src="${p.image}">
                    <div class="tinder-info">
                        <div style="font-weight:900; font-size:1.4rem; margin-bottom:5px;">${p.name}</div>
                        <div style="color:var(--accent); font-weight:800;">${p.price} ₴</div>
                    </div>
                </div>
            `).join('');
        }

        function swipeAction(dir) {
            const cards = document.querySelectorAll('.tinder-card');
            if(!cards.length) return;
            
            const topCard = cards[0];
            const p = db[tinderIndex];

            topCard.style.transform = `translateX(${dir === 'right' ? 1000 : -1000}px) rotate(${dir === 'right' ? 45 : -45}deg)`;
            topCard.style.opacity = '0';

            if(dir === 'right') {
                setTimeout(() => openSizePicker(p.id), 300);
            }

            setTimeout(() => {
                tinderIndex++;
                renderTinder();
            }, 500);
        }

        // --- 7. UTILS ---
        function switchTab(tab, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + tab).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        function openSheet(id) {
            document.getElementById('global-overlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('global-overlay').style.opacity = '1';
                document.getElementById(id).classList.add('active');
            }, 10);
            if(id === 'cart-sheet') renderCartItems();
        }

        function closeSheets() {
            document.querySelectorAll('.sheet').forEach(s => s.classList.remove('active'));
            document.getElementById('global-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('global-overlay').style.display = 'none', 400);
        }

        function setLogistics(type) {
            deliveryType = type;
            document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(type === 'Відділення' ? 'btn-vidd' : 'btn-post').classList.add('active');
        }

        function getDeclension(n) {
            let l = n % 10, l2 = n % 100;
            if(l === 1 && l2 !== 11) return "ПАРА";
            if([2,3,4].includes(l) && ![12,13,14].includes(l2)) return "ПАРИ";
            return "ПАР";
        }

        function zoom(src) { document.getElementById('zoom-img').src = src; document.getElementById('zoom-overlay').style.display = 'flex'; }
        function goStep2() { document.getElementById('cart-main-view').style.display = 'none'; document.getElementById('cart-checkout-view').style.display = 'block'; }
        function goStep1() { document.getElementById('cart-checkout-view').style.display = 'none'; document.getElementById('cart-main-view').style.display = 'block'; }
        
        function setupInfiniteScroll() {
            const obs = new IntersectionObserver(e => {
                if(e[0].isIntersecting && itemsLimit < filteredData.length) {
                    renderCatalog(true);
                }
            });
            obs.observe(document.getElementById('infinite-scroll-anchor'));
        }

    </script>
</body>
</html>
