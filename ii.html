<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOW.ZNAHIDKA — Premium Sneakers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --accent: #d4ff00; --bg: #050505; --card: #121212; --border: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        /* СПЛЕШ-ЕКРАН */
        #splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; transition: 0.6s; }
        .gender-btn { flex: 1; border: none; cursor: pointer; position: relative; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .gender-btn::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.7); }
        .gender-btn span { position: relative; font-size: 2rem; font-weight: 900; color: #fff; z-index: 2; }
        .gender-btn.men { background-image: url('https://images.unsplash.com/photo-1608231387042-66d1773070a5?q=80&w=1000'); border-bottom: 1px solid var(--border); }
        .gender-btn.women { background-image: url('https://images.unsplash.com/photo-1543163521-1bf539c55dd2?q=80&w=1000'); }

        header { position: sticky; top: 0; background: rgba(5,5,5,0.85); backdrop-filter: blur(15px); padding: 15px; text-align: center; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        /* ФІЛЬТРИ */
        .filter-wrapper { background: #000; padding: 10px 0; border-bottom: 1px solid #222; position: sticky; top: 54px; z-index: 999; }
        .filter-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 0 15px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-item { background: #1a1a1a; color: #888; border: 1px solid #333; padding: 8px 16px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .filter-item.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .search-container { padding: 15px; display: flex; gap: 10px; }
        .search-bar { flex: 1; padding: 16px 20px; border-radius: 20px; border: 1px solid var(--border); background: #161616; color: #fff; }
        .price-btn { background: #161616; border: 1px solid var(--border); border-radius: 20px; padding: 0 15px; cursor: pointer; font-size: 1.2rem; }

        /* КАТАЛОГ */
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px 20px; }
        @media (min-width: 768px) { .catalog-grid { grid-template-columns: repeat(4, 1fr); } }

        .product-card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; height: 100%; transition: 0.3s; }
        .img-container { position: relative; aspect-ratio: 1/1; background: #1a1a1a; overflow: hidden; cursor: zoom-in; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 700; margin-bottom: 12px; height: 2.8em; overflow: hidden; line-height: 1.4; color: #fff; }
        
        /* МУЛЬТИВИБІР РОЗМІРІВ */
        .sizes-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .size-btn { background: #1a1a1a; color: #888; border: 1px solid #282828; padding: 7px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05); }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: var(--accent); font-weight: 900; font-size: 1.1rem; }
        .add-btn-circle { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 14px; font-weight: 900; cursor: pointer; color: #000; font-size: 1.4rem; transition: 0.2s; }
        .add-btn-circle:active { transform: scale(0.9); }

        .tg-photo-btn { display: block; width: 100%; padding: 10px; margin-top: 12px; background: rgba(42, 171, 238, 0.1); color: #2AABEE; border: 1px solid rgba(42, 171, 238, 0.2); text-align: center; text-decoration: none; border-radius: 12px; font-size: 0.8rem; font-weight: 800; }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: #0f0f0f; padding: 25px; border-radius: 32px; width: 100%; max-width: 400px; border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }
        .modal-content input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 14px; border: 1px solid var(--border); background: #161616; color: #fff; }

        #cart-panel { position: fixed; bottom: 95px; left: 15px; right: 15px; background: var(--accent); color: #000; padding: 18px; border-radius: 22px; display: none; justify-content: space-between; font-weight: 900; z-index: 500; cursor: pointer; box-shadow: 0 10px 30px rgba(212,255,0,0.2); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 10px 30px; border-top: 1px solid var(--border); z-index: 600; }
        .nav-item { color: #555; text-decoration: none; font-size: 0.75rem; text-align: center; font-weight: 700; cursor: pointer; flex: 1; }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 6px; }
        .nav-item.active { color: var(--accent); }

        #zoom-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; cursor: zoom-out; }
        #zoom-modal img { max-width: 96%; max-height: 85vh; border-radius: 12px; }

        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10; background:black; padding:15px 25px; border-radius:40px; font-weight:900; border:1px solid var(--border)">WOW<span>.</span>ZNAHIDKA</div>
        <button class="gender-btn men" onclick="initApp('Чоловік')"><span>ЧОЛОВІКАМ</span></button>
        <button class="gender-btn women" onclick="initApp('Жінка')"><span>ЖІНКАМ</span></button>
    </div>

    <header><div class="logo">WOW<span>.</span>ZNAHIDKA</div></header>

    <div id="app-main" style="display:none">
        <div class="filter-wrapper">
            <div class="filter-scroll" id="brand-filters">
                <div class="filter-item active" onclick="filterBrand('all', this)">Всі</div>
            </div>
        </div>

        <div class="search-container">
            <input type="text" class="search-bar" id="search-input" placeholder="Пошук моделі..." oninput="handleSearch()">
            <button class="price-btn" onclick="openPriceFilter()">⚙️</button>
        </div>

        <div id="grid-home" class="catalog-grid"></div>
        <div id="scroll-anchor" style="height: 50px;"></div>
    </div>

    <div id="price-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px">Фільтр ціни</h3>
            <p>До: <span id="p-label" style="color:var(--accent)">5000</span> ₴</p>
            <input type="range" min="1500" max="10000" step="100" value="5000" style="width:100%; accent-color:var(--accent)" oninput="updatePrice(this.value)">
            <button onclick="closeModals()" style="width:100%; padding:15px; margin-top:20px; background:var(--accent); border:none; border-radius:15px; font-weight:900">ЗАСТОСУВАТИ</button>
        </div>
    </div>

    <div id="cart-panel" onclick="openOrder()">
        <span id="cart-count">0 ПАР</span><span id="cart-total">ОФОРМИТИ ➔</span>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content" id="modal-body">
            <div id="step-cart">
                <h3>Твій кошик</h3>
                <div id="cart-list" style="margin-bottom:20px"></div>
                <button onclick="goToForm()" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:16px; font-weight:900">ДАЛІ ➔</button>
            </div>
            <div id="step-form" style="display:none">
                <h3>Доставка</h3>
                <input type="text" id="fio" placeholder="ПІБ отримувача">
                <input type="tel" id="phone" placeholder="Номер телефону">
                <input type="text" id="city" placeholder="Місто та № пошти">
                <input type="text" id="promo" placeholder="Промокод">
                <button onclick="sendOrder()" id="submit-btn" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:16px; font-weight:900">ЗАМОВИТИ</button>
            </div>
        </div>
    </div>

    <div id="contacts-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; text-align:center">Наші контакти</h3>
            <a href="https://t.me/znahidkawow" target="_blank" style="display:block; background:#24A1DE; padding:15px; border-radius:15px; color:white; text-align:center; text-decoration:none; font-weight:bold; margin-bottom:10px">✈️ Telegram</a>
            <a href="https://www.instagram.com/wow.znahidka" target="_blank" style="display:block; background:#E1306C; padding:15px; border-radius:15px; color:white; text-align:center; text-decoration:none; font-weight:bold; margin-bottom:10px">📸 Instagram</a>
            <span onclick="closeModals()" style="display:block; text-align:center; cursor:pointer; color:#555; margin-top:20px">ЗАКРИТИ</span>
        </div>
    </div>

    <div id="zoom-modal" onclick="this.style.display='none'"><img id="zoomed-img" src=""></div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><span>🏠</span>Головна</div>
        <div class="nav-item" onclick="openPriceFilter()"><span>⚙️</span>Фільтри</div>
        <div class="nav-item" onclick="document.getElementById('contacts-modal').style.display='flex'"><span>💬</span>Контакти</div>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbx-Z8U9xDNV6Y2vZQvu9XfAxx0_PWanARk1Tgaq5JZ8hLXXR3EGyyKbDwGoyY7U_bxjEA/exec';
        let all = [], db = [], cart = [], selected = {}, limit = 12, curBrand = 'all', activeGender = '', activeMaxPrice = 5000, promoCodes = {};

        async function initApp(gender) {
            activeGender = gender;
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
            }, 600);

            try {
                const res = await fetch(URL + "?v=" + Date.now());
                const data = await res.json();
                all = data.products || data;
                promoCodes = data.promo || {};
                
                db = all.filter(p => p.gender === activeGender);
                renderBrands();
                render(db.slice(0, limit), 'grid-home');

                // Intersection Observer (твій нескінченний скрол)
                new IntersectionObserver(e => {
                    if(e[0].isIntersecting && limit < db.length) {
                        render(db.slice(limit, limit += 12), 'grid-home', true);
                    }
                }).observe(document.getElementById('scroll-anchor'));
            } catch(e) { alert("Помилка завантаження"); }
        }

        function renderBrands() {
            const brands = [...new Set(db.map(p => p.brand))].sort();
            const cont = document.getElementById('brand-filters');
            brands.forEach(b => {
                const d = document.createElement('div');
                d.className = 'filter-item'; d.innerText = b;
                d.onclick = (e) => filterBrand(b, e.target);
                cont.appendChild(d);
            });
        }

        function filterBrand(brand, el) {
            document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            curBrand = brand; limit = 12;
            applyFilters();
        }

        function updatePrice(v) { document.getElementById('p-label').innerText = v; activeMaxPrice = v; applyFilters(); }

        function applyFilters() {
            let filtered = db.filter(p => p.price <= activeMaxPrice);
            if(curBrand !== 'all') filtered = filtered.filter(p => p.brand === curBrand);
            const q = document.getElementById('search-input').value.toLowerCase();
            if(q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
            
            render(filtered.slice(0, limit), 'grid-home', false);
        }

        function render(items, id, append = false) {
            const h = items.map(p => {
                const sizes = p.sizes.split(',').map(s => {
                    const clean = s.trim().split('(')[0];
                    const isSel = selected[p.id] && selected[p.id].includes(s.trim());
                    return `<button class="size-btn ${isSel ? 'selected' : ''}" onclick="toggleSize(this, '${p.id}', '${s.trim()}')">${clean}</button>`;
                }).join('');

                return `
                <div class="product-card">
                    <div class="img-container" onclick="zoom('${p.image}')"><img src="${p.image}" loading="lazy"></div>
                    <div class="card-info">
                        <div class="title">${p.name}</div>
                        <div class="sizes-container">${sizes}</div>
                        <div class="price-row">
                            <div class="price">${p.price} ₴</div>
                            <button class="add-btn-circle" onclick="add('${p.id}')">+</button>
                        </div>
                        <a href="https://t.me/znahidkawow?text=${encodeURIComponent('Запит фото: '+p.name)}" target="_blank" class="tg-photo-btn">📸 Живі фото</a>
                    </div>
                </div>`;
            }).join('');
            const t = document.getElementById(id);
            if(append) t.innerHTML += h; else t.innerHTML = h;
        }

        function toggleSize(btn, id, sz) {
            if(!selected[id]) selected[id] = [];
            const idx = selected[id].indexOf(sz);
            if(idx > -1) { selected[id].splice(idx, 1); btn.classList.remove('selected'); }
            else { selected[id].push(sz); btn.classList.add('selected'); }
        }

        function add(id) {
            const p = db.find(x => x.id === id);
            const chosen = selected[id] || [];
            if(!chosen.length) return alert("Обери розмір!");
            
            chosen.forEach(s => cart.push({...p, size: s, cartId: Date.now()+Math.random()}));
            selected[id] = [];
            applyFilters(); updateCartUI();
        }

        function updateCartUI() {
            const p = document.getElementById('cart-panel');
            p.style.display = cart.length ? 'flex' : 'none';
            const total = cart.reduce((s, x) => s + parseInt(x.price), 0);
            document.getElementById('cart-count').innerText = `${cart.length} ${getDecl(cart.length)}`;
            document.getElementById('cart-total').innerText = `${total} ₴ ➔`;
        }

        function getDecl(n) { 
            if (n % 10 === 1 && n % 100 !== 11) return "ПАРА"; 
            if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return "ПАРИ"; 
            return "ПАР"; 
        }

        function openOrder() {
            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `
                <div class="cart-row">
                    <span>${i.name} (${i.size})</span>
                    <span onclick="cart.splice(${idx},1);updateCartUI();openOrder()" style="color:red">✕</span>
                </div>
            `).join('');
            document.getElementById('order-modal').style.display = 'flex';
        }

        async function sendOrder() {
            const btn = document.getElementById('submit-btn');
            const promo = document.getElementById('promo').value.toUpperCase().trim();
            let total = cart.reduce((s, x) => s + parseInt(x.price), 0);
            
            if(promoCodes[promo]) {
                const val = promoCodes[promo];
                total = val < 1 ? total * (1-val) : total - val;
            }

            const d = {
                action: "new_order", fio: document.getElementById('fio').value,
                phone: document.getElementById('phone').value, city: document.getElementById('city').value,
                items: cart.map(i => `${i.name} (${i.size})`).join(', '), total: total + " ₴", promo: promo || "Немає"
            };

            if(!d.fio || !d.phone) return alert("Заповніть дані!");
            btn.innerText = "ОБРОБКА...";
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            alert("Успішно!"); location.reload();
        }

        function handleSearch() { applyFilters(); }
        function zoom(s) { document.getElementById('zoomed-img').src = s; document.getElementById('zoom-modal').style.display='flex'; }
        function openPriceFilter() { document.getElementById('price-modal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function goToForm() { document.getElementById('step-cart').style.display='none'; document.getElementById('step-form').style.display='block'; }
    </script>
</body>
</html>
