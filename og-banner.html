<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #0a0a0a;
    color: #fff;
    position: relative;
  }

  /* Background gradient blobs */
  .blob1 {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,210,100,0.18) 0%, transparent 70%);
    top: -150px; right: -100px;
    border-radius: 50%;
  }
  .blob2 {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,120,255,0.12) 0%, transparent 70%);
    bottom: -150px; left: -80px;
    border-radius: 50%;
  }
  .blob3 {
    position: absolute;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,60,80,0.10) 0%, transparent 70%);
    top: 50px; left: 350px;
    border-radius: 50%;
  }

  /* Grid texture */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative;
    z-index: 10;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
  }

  /* Logo */
  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .logo-dot { color: #00d264; }

  /* Main headline */
  .headline {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  .headline-accent {
    color: #00d264;
  }

  /* Subline */
  .subline {
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    margin-bottom: 40px;
    letter-spacing: 0.01em;
  }

  /* Tags row */
  .tags {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 44px;
  }
  .tag {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 17px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.02em;
  }

  /* Badges row */
  .badges {
    display: flex;
    gap: 16px;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
  }
  .badge-ico {
    width: 32px; height: 32px;
    background: rgba(0,210,100,0.15);
    border: 1px solid rgba(0,210,100,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  /* Right side emoji decoration */
  .deco {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 200px;
    line-height: 1;
    opacity: 0.25;
    filter: drop-shadow(0 0 60px rgba(0,210,100,0.4));
    user-select: none;
    z-index: 5;
  }

  /* URL strip */
  .url-strip {
    position: absolute;
    bottom: 28px;
    right: 80px;
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.05em;
    z-index: 10;
  }
  .url-strip span { color: #00d264; }
</style>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="blob3"></div>
  <div class="grid"></div>

  <div class="deco">👟</div>

  <div class="content">
    <div class="logo">WOW<span class="logo-dot">.</span>ZNAHIDKA</div>

    <div class="headline">
      Преміум кросівки<br>
      <span class="headline-accent">без передоплати</span>
    </div>

    <div class="subline">Оплата після примірки на Новій Пошті</div>

    <div class="tags">
      <div class="tag">Nike</div>
      <div class="tag">Adidas</div>
      <div class="tag">New Balance</div>
      <div class="tag">Jordan</div>
      <div class="tag">Asics</div>
      <div class="tag">+ 1000 моделей</div>
    </div>

    <div class="badges">
      <div class="badge">
        <div class="badge-ico">✅</div>
        Без ризику
      </div>
      <div class="badge">
        <div class="badge-ico">📦</div>
        Нова Пошта 1–3 дні
      </div>
      <div class="badge">
        <div class="badge-ico">↩️</div>
        Повернення безкоштовно
      </div>
    </div>
  </div>

  <div class="url-strip">wowznahidka.<span>github.io</span></div>
</body>
</html>
