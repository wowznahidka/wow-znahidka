<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wow.znahidka — Твій стиль</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; --card: #121212; --border: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        header { position: sticky; top: 0; background: rgba(5,5,5,0.85); backdrop-filter: blur(15px); padding: 15px; text-align: center; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        /* СТОРІНКИ */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ФІЛЬТРИ */
        .filter-wrapper { background: #000; padding: 10px 0; border-bottom: 1px solid #222; position: sticky; top: 54px; z-index: 999; }
        .filter-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 0 15px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-item { background: #1a1a1a; color: #888; border: 1px solid #333; padding: 8px 16px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .filter-item.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .search-container { padding: 15px; }
        .search-bar { width: 100%; padding: 16px 20px; border-radius: 20px; border: 1px solid var(--border); background: #161616; color: #fff; font-size: 1rem; }

        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px 20px; }
        @media (min-width: 768px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }

        .brand-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align: center; font-weight: 900; text-transform: uppercase; cursor: pointer; margin: 10px 15px; }

        .product-card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .img-container { position: relative; aspect-ratio: 1/1; background: #1a1a1a; overflow: hidden; cursor: zoom-in; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; height: 2.8em; overflow: hidden; line-height: 1.4; color: #fff; }
        
        .sizes-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .size-btn { background: #1a1a1a; color: #888; border: 1px solid #282828; padding: 7px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }
        .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: var(--accent); font-weight: 900; font-size: 1.1rem; }
        .qty-controls { display: flex; align-items: center; gap: 8px; background: #1a1a1a; border-radius: 12px; padding: 2px; }
        .btn-qty { background: var(--accent); border: none; width: 34px; height: 34px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; font-size: 1.2rem; }
        .btn-minus { background: #222; color: #fff; }

        .tg-photo-btn { display: block; width: 100%; padding: 10px; margin-top: 12px; background: #2AABEE; color: #fff; text-align: center; text-decoration: none; border-radius: 12px; font-size: 0.8rem; font-weight: 800; transition: 0.2s; }
        .tg-photo-btn:hover { opacity: 0.8; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: #0f0f0f; padding: 25px; border-radius: 32px; width: 100%; max-width: 400px; border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }
        .modal-content input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 14px; border: 1px solid var(--border); background: #161616; color: #fff; }

        .social-btn { display: flex; align-items: center; gap: 15px; background: #161616; padding: 18px; border-radius: 20px; text-decoration: none; color: #fff; font-weight: 800; margin-bottom: 12px; border: 1px solid var(--border); transition: 0.3s; }
        .social-btn.tg { border-left: 5px solid #24A1DE; }
        .social-btn.ig { border-left: 5px solid #E1306C; }
        .social-btn.tt { border-left: 5px solid #fff; }

        #zoom-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; cursor: zoom-out; }
        #zoom-modal img { max-width: 96%; max-height: 85vh; border-radius: 12px; }
        #cart-panel { position: fixed; bottom: 95px; left: 15px; right: 15px; background: var(--accent); color: #000; padding: 18px; border-radius: 22px; display: none; justify-content: space-between; font-weight: 900; z-index: 500; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 10px 30px; border-top: 1px solid var(--border); z-index: 600; }
        .nav-item { color: #555; text-decoration: none; font-size: 0.75rem; text-align: center; font-weight: 700; cursor: pointer; flex: 1; }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 6px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body onscroll="document.getElementById('search-input').blur()">

    <header><div class="logo">WOW<span>.</span>ZNAHIDKA</div></header>

    <div id="page-home" class="page active-page">
        <div class="filter-wrapper">
            <div class="filter-scroll" id="brand-filters-home">
                <div class="filter-item active" onclick="filterByBrand('all', this)">Всі</div>
            </div>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" id="search-input" placeholder="Пошук моделі..." oninput="handleSearch()">
        </div>
        <div id="grid-home" class="catalog-grid"></div>
        <div id="scroll-anchor" style="height: 50px;"></div>
    </div>

    <div id="page-catalog" class="page">
        <h2 style="padding: 20px 20px 0;">Каталог брендів</h2>
        <div id="brands-list"></div>
    </div>

    <div id="contacts-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px; text-align: center;">Наші контакти</h3>
            <a href="https://t.me/znahidkawow" target="_blank" class="social-btn tg">✈️ Telegram</a>
            <a href="https://www.instagram.com/wow.znahidka/" target="_blank" class="social-btn ig">📸 Instagram</a>
            <a href="https://www.tiktok.com/@wow.znahidka" target="_blank" class="social-btn tt">🎵 TikTok</a>
            <span style="text-align:center; display:block; cursor:pointer; color:#555; margin-top:20px; font-weight: bold;" onclick="closeModals()">ЗАКРИТИ</span>
        </div>
    </div>

    <div id="zoom-modal" onclick="this.style.display='none'"><img id="zoomed-img" src=""></div>

    <div id="order-modal" class="modal">
        <div class="modal-content" id="modal-body">
            <div id="step-cart">
                <h3>Твій кошик</h3>
                <div id="cart-list" style="margin-bottom: 20px;"></div>
                
                <div style="background:rgba(212,255,0,0.08); padding:18px; border-radius:16px; margin-bottom:15px; border: 1px dashed rgba(212,255,0,0.3);">
                    <div style="color:var(--accent); font-weight:900; font-size:1.1rem; margin-bottom:5px;">📦 Накладний платіж</div>
                    <div style="font-size:0.8rem; color:#aaa; line-height:1.4;">Оплата здійснюється виключно після огляду та примірки на пошті. Жодних передоплат!</div>
                </div>

                <button onclick="goToForm()" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:16px; font-weight:900;">ДАЛІ ➔</button>
            </div>
            <div id="step-form" style="display:none;">
                <h3>Доставка</h3>
                <input type="text" id="fio" placeholder="ПІБ отримувача">
                <input type="tel" id="phone" placeholder="Номер телефону">
                <input type="text" id="city" placeholder="Місто">
                <input type="text" id="social" placeholder="Нік Telegram / Instagram">
                <div style="display:flex; gap:10px; margin-bottom:12px">
                    <div id="t1" class="filter-item active" style="flex:1; text-align:center;" onclick="setDel('Відділення', this)">Відділення</div>
                    <div id="t2" class="filter-item" style="flex:1; text-align:center;" onclick="setDel('Поштомат', this)">Поштомат</div>
                </div>
                <input type="text" id="np" placeholder="№ відділення / поштомату">
                <input type="text" id="promo" placeholder="Промокод">
                <button onclick="sendOrder()" id="submit-btn" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:16px; font-weight:900;">ЗАМОВИТИ</button>
            </div>
        </div>
    </div>

    <div id="cart-panel" onclick="openOrder()">
        <span id="cart-count">0 ПАР</span><span id="cart-total">ОФОРМИТИ ➔</span>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span>🏠</span>Головна</div>
        <div class="nav-item" id="nav-catalog" onclick="switchTab('catalog')"><span>👟</span>Каталог</div>
        <div class="nav-item" id="nav-contacts" onclick="openContacts()"><span>💬</span>Контакти</div>
    </div>

    <script>
        // ТУТ ВСТАВ СВОЄ ПОСИЛАННЯ З GOOGLE APPS SCRIPT
        const URL = 'https://script.google.com/macros/s/AKfycbwRlSkTkGtaVvlNUt0QBWFKKW8Q-YeKYv1fzPR0OCTGrXG8diIrvFxKPvy8u2Z_625a/exec';
        
        let all = [], cart = [], selected = {}, limit = 12, curBrand = 'all', dType = 'Відділення';

        async function init() {
            try {
                // Вбивалка кешу: сайт завжди завантажує свіжі дані!
                const res = await fetch(URL + "?v=" + new Date().getTime()); 
                all = await res.json(); 
                
                // --- РОЗУМНЕ СОРТУВАННЯ З ПРІОРІТЕТОМ ---
                // 1. Сортуємо за кількістю розмірів (базова логіка)
                all.sort((a, b) => {
                    const countA = a.sizes ? a.sizes.toString().split(',').filter(s => s.trim() !== '').length : 0;
                    const countB = b.sizes ? b.sizes.toString().split(',').filter(s => s.trim() !== '').length : 0;
                    return countB - countA;
                });

                // 2. Витягуємо ПРІОРИТЕТ (ID: 637) на самий початок
                const pID = "63721";
                const priorityIdx = all.findIndex(p => p.id == pID);
                if (priorityIdx !== -1) {
                    const item = all.splice(priorityIdx, 1)[0];
                    all.unshift(item);
                }
                // --------------------------------

                renderBrands();
                render(all.slice(0, limit), 'grid-home');
                
                new IntersectionObserver(e => { 
                    if(e[0].isIntersecting && limit < (curBrand === 'all' ? all.length : all.filter(p => p.brand === curBrand).length)) {
                        const list = curBrand === 'all' ? all : all.filter(p => p.brand === curBrand);
                        render(list.slice(limit, limit += 12), 'grid-home', true);
                    }
                }).observe(document.getElementById('scroll-anchor'));
            } catch(e) { console.log("Помилка завантаження:", e); }
        }

        function renderBrands() {
            const brands = [...new Set(all.map(p => p.brand))].sort();
            const filterCont = document.getElementById('brand-filters-home');
            brands.forEach(b => {
                const div = document.createElement('div');
                div.className = 'filter-item'; div.innerText = b;
                div.onclick = (e) => filterByBrand(b, e.target);
                filterCont.appendChild(div);
            });
            document.getElementById('brands-list').innerHTML = brands.map(b => `<div class="brand-card" onclick="openBrandPage('${b}')">${b}</div>`).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(tab !== 'contacts') {
                document.getElementById('page-' + tab).classList.add('active-page');
                document.getElementById('nav-' + tab).classList.add('active');
            }
            window.scrollTo(0,0);
        }

        function openBrandPage(b) { 
            switchTab('home'); 
            const its = document.querySelectorAll('#brand-filters-home .filter-item'); 
            its.forEach(i => { if(i.innerText === b) filterByBrand(b, i); }); 
        }

        function filterByBrand(brand, el) {
            document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            curBrand = brand; limit = 12;
            const f = brand === 'all' ? all : all.filter(p => p.brand === brand);
            render(f.slice(0, limit), 'grid-home', false);
            window.scrollTo(0,0);
        }

        function render(items, id, append = false) {
            const pID = "63721";

            // Якщо ми малюємо головну сторінку (не дозавантаження)
            if (!append) {
                // Шукаємо індекс нашої моделі
                const priorityIdx = items.findIndex(x => String(x.id).trim() === pID);
                
                if (priorityIdx !== -1) {
                    // Вирізаємо її з масиву і ставимо на 0-ве місце
                    const [priorityItem] = items.splice(priorityIdx, 1);
                    items.unshift(priorityItem);
                }
            }

            const h = items.map(p => {
                const sz = (p.sizes || "").toString().split(',').map(s => `
                    <button class="size-btn ${selected[p.id] === s.trim() ? 'selected' : ''}" 
                            onclick="pickSize(this,'${p.id}','${s.trim()}')">
                        ${s.trim()}
                    </button>`).join('');
                
                const count = cart.filter(i => i.id === p.id).length;
                let btn = `<button class="btn-qty" onclick="addToCart('${p.id}')">+</button>`;
                if(count > 0) btn = `<div class="qty-controls"><button class="btn-qty btn-minus" onclick="removeFromCart('${p.id}')">−</button><button class="btn-qty" onclick="addToCart('${p.id}')">+</button></div>`;
                
                const imgSrc = (p.image && !p.image.includes('t.me')) ? p.image : 'https://via.placeholder.com/400x400/1a1a1a/d4ff00?text=ФОТО+В+TELEGRAM';
                
                let tgLink = p.telegramLink || p.tgPost || "";
                if (!tgLink) {
                    for (let key in p) {
                        if (typeof p[key] === 'string' && p[key].includes('t.me') && !p[key].includes('znahidkawow')) {
                            tgLink = p[key];
                            break;
                        }
                    }
                }

                let tgBtn = '';
                if (tgLink) {
                    tgBtn = `<a href="${tgLink}" target="_blank" class="tg-photo-btn">📸 Більше фото</a>`;
                } else {
                    const message = encodeURIComponent(`Привіт! Хочу побачити додаткові фото цієї моделі: ${p.name}`);
                    tgBtn = `<a href="https://t.me/znahidkawow?text=${message}" target="_blank" class="tg-photo-btn" style="background: #24A1DE; border: 1px solid #1a88bd;">✈️ Запросити додаткові фото</a>`;
                }

                return `
                <div class="product-card">
                    <div class="img-container" onclick="zoom('${imgSrc}')">
                        <img src="${imgSrc}" loading="lazy" alt="${p.name}">
                    </div>
                    <div class="card-info">
                        <div class="title">${p.name}</div>
                        <div class="sizes-container">${sz}</div>
                        <div class="price-row">
                            <div class="price">${p.price} ₴</div>
                            <div id="act-${p.id}">${btn}</div>
                        </div>
                        ${tgBtn}
                    </div>
                </div>`;
            }).join('');
            if(append) document.getElementById(id).innerHTML += h; else document.getElementById(id).innerHTML = h;
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase().trim();
            if (!q) {
                render(all.slice(0, 12), 'grid-home');
                return;
            }
            const words = q.split(' ').filter(w => w.length > 0);
            const filtered = all.filter(p => {
                const name = p.name.toLowerCase();
                return words.every(w => name.includes(w));
            });
            render(filtered.slice(0, 24), 'grid-home');
        }

        function updateCart() {
            const p = document.getElementById('cart-panel');
            p.style.display = cart.length ? 'flex' : 'none';
            document.getElementById('cart-count').innerText = `${cart.length} ${getDeclension(cart.length)}`;
            const total = cart.reduce((s, x) => s + parseInt(x.price), 0);
            document.getElementById('cart-total').innerText = `${total} ₴ ➔`;
        }

        function zoom(s) { document.getElementById('zoomed-img').src = s; document.getElementById('zoom-modal').style.display='flex'; }
        function pickSize(b, id, s) { selected[id] = s; b.parentElement.querySelectorAll('.size-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); }
        function addToCart(id) { if(!selected[id]) return alert("Обери розмір!"); const p = all.find(x => x.id === id); cart.push({...p, size: selected[id]}); updateUI(id); updateCart(); }
        function removeFromCart(id) { const idx = cart.map(i => i.id).lastIndexOf(id); if(idx !== -1) cart.splice(idx, 1); updateUI(id); updateCart(); }
        function updateUI(id) { const count = cart.filter(i => i.id === id).length; const cont = document.getElementById(`act-${id}`); if(cont) cont.innerHTML = count > 0 ? `<div class="qty-controls"><button class="btn-qty btn-minus" onclick="removeFromCart('${id}')">−</button><button class="btn-qty" onclick="addToCart('${id}')">+</button></div>` : `<button class="btn-qty" onclick="addToCart('${id}')">+</button>`; }
        function getDeclension(n) { if (n % 10 === 1 && n % 100 !== 11) return "ПАРА"; if ([2, 3, 4].includes(n % 10) && ![12, 13, 14].includes(n % 100)) return "ПАРИ"; return "ПАР"; }
        function openOrder() { document.getElementById('cart-list').innerHTML = cart.map(i => `<div style="padding:10px;background:#161616;margin-bottom:5px;border-radius:10px; font-size: 0.9rem;">🔹 ${i.name} (р. ${i.size})</div>`).join(''); document.getElementById('order-modal').style.display='flex'; }
        function openContacts() { document.getElementById('contacts-modal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function setDel(t, b) { dType = t; b.parentElement.querySelectorAll('.filter-item').forEach(x => x.classList.remove('active')); b.classList.add('active'); }
        function goToForm() { document.getElementById('step-cart').style.display='none'; document.getElementById('step-form').style.display='block'; }
        
        async function sendOrder() {
            const total = cart.reduce((s, x) => s + parseInt(x.price), 0);
            const d = { 
                action: "new_order", 
                fio: document.getElementById('fio').value, 
                phone: document.getElementById('phone').value, 
                city: document.getElementById('city').value, 
                socialNick: document.getElementById('social').value, 
                delivery: `${dType} №${document.getElementById('np').value} (Накладний платіж)`, 
                items: cart.map(i => `${i.name} (р. ${i.size})`).join(', '), 
                total: total + " ₴", 
                promo: document.getElementById('promo').value 
            };
            
            if(!d.fio || !d.phone || !document.getElementById('np').value) {
                return alert("Будь ласка, заповніть ПІБ, Телефон та № відділення!");
            }

            document.getElementById('submit-btn').innerText = "ОБРОБКА...";
            
            try {
                await fetch(URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(d) 
                });

                cart = [];
                updateCart();

                document.getElementById('modal-body').innerHTML = `
                    <div style="text-align:center; padding:35px 10px;">
                        <div style="font-size:5rem; margin-bottom:15px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform: scale(0);">✅</div>
                        <h2 style="color:var(--accent); margin:0 0 10px 0; font-size:1.6rem;">Замовлення успішне!</h2>
                        <p style="color:#aaa; font-size:0.9rem; line-height:1.5; margin-bottom:25px;">
                            Дякуємо! Найближчим часом ми зв'яжемося з вами.
                        </p>
                        <button onclick="location.reload()" style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:16px; font-weight:900; font-size:1.1rem; cursor:pointer;">НА ГОЛОВНУ</button>
                    </div>
                    <style>@keyframes popIn { to { transform: scale(1); } }</style>
                `;
            } catch(e) { 
                alert("Помилка. Перевірте інтернет.");
                document.getElementById('submit-btn').innerText = "ЗАМОВИТИ";
            }
        }

        init();
    </script>
</body>
</html>
