<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wow.znahidka</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; --card: #121212; --border: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 110px; }
        
        header { position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); padding: 20px 15px; text-align: center; z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .search-container { padding: 15px; }
        .search-bar { width: 100%; padding: 16px 20px; border-radius: 18px; border: 1px solid var(--border); background: #161616; color: #fff; outline: none; font-size: 1rem; }

        .page { display: none; }
        .active-page { display: block; }

        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px 20px; }
        .product-card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
        
        .img-container { position: relative; aspect-ratio: 1/1; background: #1a1a1a; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }

        .card-info { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; line-height: 1.4; height: 2.8em; overflow: hidden; color: #fff; }
        
        .sizes-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .size-btn { background: #1a1a1a; color: #888; border: 1px solid #282828; padding: 7px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }
        .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: var(--accent); font-weight: 900; font-size: 1.15rem; }
        .add-btn { background: var(--accent); border: none; width: 42px; height: 42px; border-radius: 14px; font-weight: bold; cursor: pointer; color: #000; font-size: 1.4rem; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: #0f0f0f; padding: 30px 25px; border-radius: 32px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        .modal-content h3 { margin: 0 0 20px; text-align: center; }

        /* CART LIST */
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: #161616; padding: 12px; border-radius: 16px; margin-bottom: 10px; border: 1px solid #222; }
        .cart-item-info b { font-size: 0.9rem; display: block; margin-bottom: 4px; }
        .cart-item-info span { color: var(--accent); font-weight: 700; font-size: 0.85rem; }
        .remove-btn { color: #ff4444; background: none; border: 1px solid #ff4444; border-radius: 10px; padding: 6px 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }

        /* FORM */
        .order-form { display: none; }
        .order-form input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid var(--border); background: #161616; color: #fff; outline: none; }
        
        .delivery-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .delivery-btn { background: #161616; border: 1px solid var(--border); color: #666; padding: 14px; border-radius: 14px; flex: 1; text-align: center; font-weight: 800; cursor: pointer; }
        .delivery-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,255,0,0.05); }

        .payment-card { background: rgba(212,255,0,0.05); border: 1px dashed var(--accent); border-radius: 18px; padding: 15px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center; font-size: 0.85rem; }
        .payment-card b { color: var(--accent); display: block; }

        .btn-action { width: 100%; background: var(--accent); color: #000; padding: 18px; border: none; border-radius: 16px; font-weight: 900; font-size: 1rem; cursor: pointer; }
        .close-btn { text-align: center; color: #555; margin-top: 15px; cursor: pointer; font-weight: 800; display: block; }

        /* BOTTOM */
        #cart-panel { position: fixed; bottom: 95px; left: 15px; right: 15px; background: var(--accent); color: #000; padding: 20px; border-radius: 22px; display: none; justify-content: space-between; font-weight: 900; z-index: 500; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 10px 30px; border-top: 1px solid var(--border); z-index: 600; }
        .nav-item { color: #555; text-decoration: none; font-size: 0.75rem; text-align: center; font-weight: 700; cursor: pointer; }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 6px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <header><div class="logo">WOW<span>.</span>ZNAHIDKA</div></header>

    <div id="page-home" class="page active-page">
        <div class="search-container"><input type="text" class="search-bar" id="search-input" placeholder="Пошук моделі..." oninput="handleSearch()"></div>
        <div id="grid-home" class="catalog-grid"></div>
        <div id="load-more-home" style="display:none; text-align:center; padding: 20px; color:var(--accent);" onclick="loadMore('home')">Показати ще</div>
    </div>

    <div id="page-catalog" class="page">
        <div id="brand-container" class="brand-list" style="padding: 15px; display: grid; gap: 12px;"></div>
    </div>

    <div id="page-brand-results" class="page">
        <div style="padding: 15px; display: flex; align-items: center; gap: 15px;">
            <button onclick="switchTab('catalog')" style="background:none; border:none; color:var(--accent); font-size:1.8rem;">←</button>
            <h2 id="brand-title" style="margin:0;"></h2>
        </div>
        <div id="grid-brand" class="catalog-grid"></div>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <div id="step-cart">
                <h3>Ваш кошик</h3>
                <div id="cart-items-list" style="margin-bottom: 20px;"></div>
                <div class="payment-card">
                    <span>📦</span>
                    <p><b>Оплата при отриманні</b>Ви оплачуєте замовлення на пошті після огляду та примірки.</p>
                </div>
                <button class="btn-action" onclick="goToForm()">ПІДТВЕРДИТИ СПИСОК</button>
                <span class="close-btn" onclick="closeModals()">Повернутись до покупок</span>
            </div>

            <div id="step-form" class="order-form">
                <h3>Дані для доставки</h3>
                <input type="text" id="fio" placeholder="ПІБ отримувача">
                <input type="tel" id="phone" placeholder="Номер телефону">
                <input type="text" id="city" placeholder="Місто">
                <input type="text" id="social-nick" placeholder="Ваш нік (TG/IG)">
                
                <div class="delivery-toggle">
                    <div id="type-branch" class="delivery-btn active" onclick="setDelivery('Відділення')">Відділення</div>
                    <div id="type-post" class="delivery-btn" onclick="setDelivery('Поштомат')">Поштомат</div>
                </div>
                <input type="text" id="np-number" placeholder="№ відділення/поштомату">
                
                <button id="submit-order-btn" onclick="sendOrder()" class="btn-action">ОФОРМИТИ ЗАМОВЛЕННЯ</button>
                <span class="close-btn" onclick="backToCart()">← Назад до списку</span>
            </div>
        </div>
    </div>

    <div id="cart-panel" onclick="openOrderForm()">
        <span id="cart-count">0 ТОВАРІВ</span>
        <span id="cart-total">ОФОРМИТИ ➔</span>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span>🏠</span>Головна</div>
        <div class="nav-item" id="nav-catalog" onclick="switchTab('catalog')"><span>👟</span>Каталог</div>
        <div class="nav-item" onclick="alert('TG: @znahidkawow\nIG: @wow.znahidka')"><span>💬</span>Контакти</div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOrpI1ESu71wfiV4ThsUX_nVbXpkmfChj-px5UnlSDkTOeg24EdG2TmF4rsBnmuED9sA/exec';
        let allProducts = [], cart = [], selectedSizes = {}, currentDelivery = 'Відділення';
        const ITEMS_PER_PAGE = 10;

        async function init() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                allProducts = await res.json();
                renderCards(allProducts.slice(0, ITEMS_PER_PAGE), 'grid-home');
                if (allProducts.length > ITEMS_PER_PAGE) document.getElementById('load-more-home').style.display = 'block';
                renderBrands();
            } catch (e) { console.error(e); }
        }

        function renderCards(products, containerId, append = false) {
            const container = document.getElementById(containerId);
            const html = products.map(p => {
                const firstImg = p.image.split(',')[0].trim();
                const sizesHtml = p.sizes.map(s => `<button class="size-btn ${selectedSizes[p.id] === s ? 'selected' : ''}" onclick="pickSize(this, '${p.id}', '${s}')">${s}</button>`).join('');
                return `
                <div class="product-card">
                    <div class="img-container"><img src="${firstImg}"></div>
                    <div class="card-info">
                        <div class="title">${p.name}</div>
                        <div class="sizes-container">${sizesHtml}</div>
                        <div class="price-row">
                            <div class="price">${p.price} ₴</div>
                            <button class="add-btn" onclick="addToCart('${p.id}', '${p.name}', '${p.price}')">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            if (append) container.innerHTML += html; else container.innerHTML = html;
        }

        function pickSize(btn, id, size) {
            selectedSizes[id] = size;
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function addToCart(id, name, price) {
            if (!selectedSizes[id]) { alert("Оберіть розмір!"); return; }
            cart.push({ cartId: Date.now(), name: name, size: selectedSizes[id], price: parseInt(price) });
            updateCartPanel();
        }

        function updateCartPanel() {
            const panel = document.getElementById('cart-panel');
            if (cart.length > 0) {
                panel.style.display = 'flex';
                document.getElementById('cart-count').innerText = `${cart.length} ТОВАР(И)`;
                const total = cart.reduce((s, i) => s + i.price, 0);
                document.getElementById('cart-total').innerText = `${total} ₴ ➔`;
            } else { panel.style.display = 'none'; }
        }

        function openOrderForm() {
            renderCartList();
            document.getElementById('step-cart').style.display = 'block';
            document.getElementById('step-form').style.display = 'none';
            document.getElementById('order-modal').style.display = 'flex';
        }

        function renderCartList() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <b>${item.name}</b>
                        <span>Розмір: ${item.size} - ${item.price} ₴</span>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">Видалити</button>
                </div>
            `).join('');
        }

        function removeItem(index) {
            cart.splice(index, 1);
            renderCartList();
            updateCartPanel();
            if (cart.length === 0) closeModals();
        }

        function goToForm() {
            document.getElementById('step-cart').style.display = 'none';
            document.getElementById('step-form').style.display = 'block';
        }

        function backToCart() {
            document.getElementById('step-form').style.display = 'none';
            document.getElementById('step-cart').style.display = 'block';
        }

        function closeModals() { document.getElementById('order-modal').style.display = 'none'; }

        function setDelivery(t) {
            currentDelivery = t;
            document.getElementById('type-branch').classList.toggle('active', t === 'Відділення');
            document.getElementById('type-post').classList.toggle('active', t === 'Поштомат');
        }

        function sendOrder() {
            const fio = document.getElementById('fio').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const city = document.getElementById('city').value.trim();
            const np = document.getElementById('np-number').value.trim();
            if (!fio || !phone || !city || !np) { alert("Заповніть усі поля!"); return; }

            const btn = document.getElementById('submit-order-btn');
            btn.innerText = "ВІДПРАВЛЯЄМО..."; btn.disabled = true;

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ 
                    productName: cart.map(i => `${i.name} (${i.size})`).join(' | '), 
                    price: cart.reduce((s, i) => s + i.price, 0) + " ₴", 
                    fio: `${fio} (${document.getElementById('social-nick').value})`, phone, city, deliveryType: currentDelivery, npNumber: np
                })
            }).then(() => { alert("Замовлення прийнято! Очікуйте повідомлення."); location.reload(); });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + tabId).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (tabId === 'home') document.getElementById('nav-home').classList.add('active');
            if (tabId === 'catalog') document.getElementById('nav-catalog').classList.add('active');
        }

        function renderBrands() {
            const brands = [...new Set(allProducts.map(p => p.name.split(' ')[0]))];
            document.getElementById('brand-container').innerHTML = brands.map(b => `<div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border); font-weight:bold;" onclick="openBrand('${b}')">${b} ➔</div>`).join('');
        }

        function openBrand(brand) {
            document.getElementById('brand-title').innerText = brand;
            renderCards(allProducts.filter(p => p.name.startsWith(brand)), 'grid-brand');
            switchTab('brand-results');
        }

        init();
    </script>
</body>
</html>
