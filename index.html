<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wow.znahidka — Магазин кросівок</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; --card: #121212; --border: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 110px; min-height: 100vh; overflow-x: hidden; }
        header { position: sticky; top: 0; background: rgba(5,5,5,0.85); backdrop-filter: blur(20px); padding: 20px 15px; text-align: center; z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        .search-container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .search-bar { width: 100%; padding: 16px 20px; border-radius: 20px; border: 1px solid var(--border); background: #161616; color: #fff; outline: none; font-size: 1rem; }
        .page { display: none; max-width: 1400px; margin: 0 auto; }
        .active-page { display: block; }
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px 20px; }
        @media (min-width: 768px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }
        .product-card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .img-container { position: relative; aspect-ratio: 1/1; background: #1a1a1a; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; height: 2.8em; overflow: hidden; }
        .sizes-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .size-btn { background: #1a1a1a; color: #888; border: 1px solid #282828; padding: 7px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }
        .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: var(--accent); font-weight: 900; font-size: 1.15rem; }
        .btn-qty { background: var(--accent); border: none; width: 38px; height: 38px; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; font-size: 1.2rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: #0f0f0f; padding: 30px 25px; border-radius: 32px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        .modal-content input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid var(--border); background: #161616; color: #fff; outline: none; }
        .social-link { display: flex; align-items: center; gap: 15px; background: #161616; padding: 18px; border-radius: 20px; text-decoration: none; color: #fff; font-weight: 800; margin-bottom: 12px; border: 1px solid var(--border); }
        .social-link.tg { border-left: 5px solid #24A1DE; }
        .social-link.ig { border-left: 5px solid #E1306C; }
        .social-link.tt { border-left: 5px solid #fff; }
        #cart-panel { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 600px; background: var(--accent); color: #000; padding: 20px; border-radius: 22px; display: none; justify-content: space-between; font-weight: 900; z-index: 500; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 10px 30px; border-top: 1px solid var(--border); z-index: 600; }
        .nav-item { color: #555; text-decoration: none; font-size: 0.75rem; text-align: center; font-weight: 700; cursor: pointer; }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 6px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>
    <header><div class="logo">WOW<span>.</span>ZNAHIDKA</div></header>
    <div id="page-home" class="page active-page">
        <div class="search-container"><input type="text" class="search-bar" id="search-input" placeholder="Пошук..." oninput="handleSearch()"></div>
        <div id="grid-home" class="catalog-grid"></div>
        <div id="scroll-anchor" style="height: 50px;"></div>
    </div>
    <div id="page-catalog" class="page">
        <h3 style="padding: 20px; color: #444;">БРЕНДИ</h3>
        <div id="brand-container" class="catalog-grid"></div>
    </div>
    <div id="contacts-modal" class="modal">
        <div class="modal-content">
            <h3>Зв'язок</h3>
            <a href="https://t.me/znahidkawow" target="_blank" class="social-link tg">✈️ Telegram</a>
            <a href="https://www.instagram.com/wow.znahidka" target="_blank" class="social-link ig">📸 Instagram</a>
            <a href="https://www.tiktok.com/@wow.znahidka" target="_blank" class="social-link tt">🎵 TikTok</a>
            <span style="text-align:center; display:block; cursor:pointer; color:#555; margin-top:20px;" onclick="closeModals()">Закрити</span>
        </div>
    </div>
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h3>Оформлення</h3>
            <div id="cart-list" style="margin-bottom:20px"></div>
            <input type="text" id="fio" placeholder="ПІБ">
            <input type="tel" id="phone" placeholder="Телефон">
            <input type="text" id="city" placeholder="Місто">
            <input type="text" id="np" placeholder="№ Відділення">
            <button onclick="sendOrder()" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:16px; font-weight:900;">ЗАМОВИТИ</button>
            <span style="text-align:center; display:block; margin-top:15px; color:#555; cursor:pointer" onclick="closeModals()">Назад</span>
        </div>
    </div>
    <div id="cart-panel" onclick="openOrder()">
        <span id="cart-count">0 ТОВАРІВ</span><span id="cart-total">ОФОРМИТИ ➔</span>
    </div>
    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span>🏠</span>Головна</div>
        <div class="nav-item" id="nav-catalog" onclick="switchTab('catalog')"><span>👟</span>Каталог</div>
        <div class="nav-item" onclick="openContacts()"><span>💬</span>Контакти</div>
    </div>
    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbw0jCGNoB8UABVctldqXi4Onty6Hbrk_5yWuyk5HrqgCi8Vgyoh9TSt-m01VAnW9pS8/exec';
        let all = [], cart = [], selected = {}, limit = 10;
        async function init() {
            try {
                const r = await fetch(URL); all = await r.json(); all.reverse();
                render(all.slice(0, limit), 'grid-home');
                const brands = [...new Set(all.map(p => p.brand))];
                document.getElementById('brand-container').innerHTML = brands.map(b => `<div style="background:#121212;padding:25px;border-radius:20px;border:1px solid #222;font-weight:900;text-align:center" onclick="openBrand('${b}')">${b}</div>`).join('');
                new IntersectionObserver(e => { if(e[0].isIntersecting && limit < all.length) render(all.slice(limit, limit += 10), 'grid-home', true); }).observe(document.getElementById('scroll-anchor'));
            } catch(e) { document.getElementById('scroll-anchor').innerText = "Помилка зв'язку."; }
        }
        function render(items, id, append = false) {
            const h = items.map(p => {
                const sz = p.sizes.split(',').map(s => `<button class="size-btn ${selected[p.id] === s.trim() ? 'selected' : ''}" onclick="pickSize(this,'${p.id}','${s.trim()}')">${s.trim()}</button>`).join('');
                return `<div class="product-card"><div class="img-container" onclick="window.open('${p.image}')"><img src="${p.image}"></div><div class="card-info"><div class="brand-name">${p.brand}</div><div class="title">${p.name}</div><div class="sizes-container">${sz}</div><div class="price-row"><div class="price">${p.price} ₴</div><button class="btn-qty" onclick="addToCart('${p.id}')">+</button></div></div></div>`;
            }).join('');
            document.getElementById(id).innerHTML = append ? document.getElementById(id).innerHTML + h : h;
        }
        function pickSize(b, id, s) { selected[id] = s; b.parentElement.querySelectorAll('.size-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); }
        function addToCart(id) { if(!selected[id]) return alert("Обери розмір!"); const p = all.find(x => x.id === id); cart.push({...p, size: selected[id]}); updateCart(); }
        function updateCart() { const p = document.getElementById('cart-panel'); p.style.display = cart.length ? 'flex' : 'none'; document.getElementById('cart-count').innerText = `${cart.length} ТОВАРІВ`; document.getElementById('cart-total').innerText = `${cart.reduce((s, x) => s + parseInt(x.price), 0)} ₴ ➔`; }
        function openOrder() { document.getElementById('cart-list').innerHTML = cart.map(i => `<div style="padding:10px;background:#161616;margin-bottom:5px;border-radius:10px">${i.name} (${i.size})</div>`).join(''); document.getElementById('order-modal').style.display='flex'; }
        function openContacts() { document.getElementById('contacts-modal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function switchTab(t) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById('page-'+t).classList.add('active-page'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); if(t==='home'||t==='catalog') document.getElementById('nav-'+t).classList.add('active'); window.scrollTo(0,0); }
        function openBrand(b) { render(all.filter(p => p.brand === b), 'grid-home'); switchTab('home'); }
        function handleSearch() { const q = document.getElementById('search-input').value.toLowerCase(); render(all.filter(p => p.name.toLowerCase().includes(q)).slice(0, 15), 'grid-home'); }
        async function sendOrder() {
            const d = { action: "new_order", fio: document.getElementById('fio').value, phone: document.getElementById('phone').value, city: document.getElementById('city').value, delivery: document.getElementById('np').value, items: cart.map(i => `${i.name} (${i.size})`).join(', '), total: cart.reduce((s, x) => s + parseInt(x.price), 0) };
            await fetch(URL, { method: 'POST', body: JSON.stringify(d) });
            window.open(`https://t.me/znahidkawow?text=Замовив: ${d.items}`);
            location.reload();
        }
        init();
    </script>
</body>
</html>
