<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wow.znahidka</title>
    <style>
        :root { --accent: #d4ff00; --bg: #000; --card: #121212; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 120px; }
        
        /* Glassmorphism Header */
        header { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); padding: 20px; text-align: center; z-index: 100; border-bottom: 1px solid #222; }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .search-container { padding: 10px 15px; position: sticky; top: 65px; background: var(--bg); z-index: 99; }
        .search-bar { width: 100%; padding: 14px 20px; border-radius: 15px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(212, 255, 0, 0.1); }

        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .product-card { background: var(--card); border-radius: 24px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s; }
        .product-card:active { transform: scale(0.98); }
        .img-container img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; line-height: 1.3; height: 2.6em; overflow: hidden; color: #ccc; }
        
        .sizes-container { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
        .size-btn { background: #1f1f1f; color: #fff; border: 1px solid #333; padding: 6px 9px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; font-weight: 600; }
        .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: var(--accent); font-weight: 900; font-size: 1.1rem; }
        .add-btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; }

        /* Floating Cart Panel */
        #cart-panel { position: fixed; bottom: 85px; left: 15px; right: 15px; background: var(--accent); color: #000; padding: 18px; border-radius: 20px; display: none; justify-content: space-between; font-weight: 900; z-index: 200; box-shadow: 0 10px 30px rgba(212,255,0,0.3); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Modern Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 10px 25px; border-top: 1px solid #222; z-index: 300; }
        .nav-item { color: #666; text-decoration: none; font-size: 0.75rem; text-align: center; transition: 0.3s; }
        .nav-item span { display: block; font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }

        /* Enhanced Order Window */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #161616; padding: 30px; border-radius: 30px; max-width: 450px; margin: auto; border: 1px solid #333; position: relative; }
        .modal-content h3 { margin: 0 0 5px 0; font-size: 1.5rem; }
        .modal-content p.subtitle { color: #666; font-size: 0.8rem; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; text-transform: uppercase; font-weight: 700; }
        .modal-content input, .modal-content select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #222; color: #fff; font-size: 1rem; outline: none; }
        
        .delivery-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .delivery-btn { background: #222; border: 1px solid #333; color: #888; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.85rem; }
        .delivery-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,255,0,0.05); }

        .payment-info { background: rgba(212,255,0,0.1); color: var(--accent); padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; text-align: center; margin-bottom: 20px; }
        .submit-order { width: 100%; background: var(--accent); padding: 18px; border: none; border-radius: 15px; font-weight: 900; font-size: 1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(212,255,0,0.2); }
    </style>
</head>
<body>
    <header><div class="logo">WOW<span>.</span>ZNAHIDKA</div></header>
    <div class="search-container"><input type="text" id="search-input" class="search-bar" placeholder="Знайди свою пару..." oninput="handleSearch()"></div>
    
    <div id="catalog" class="catalog-grid"></div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h3>Оформлення</h3>
            <p class="subtitle">Будь ласка, вкажіть дані для доставки</p>
            
            <div class="input-group"><label>ПІБ отримувача</label><input type="text" id="fio" placeholder="Шевченко Тарас"></div>
            <div class="input-group"><label>Телефон</label><input type="tel" id="phone" placeholder="099 000 00 00"></div>
            <div class="input-group"><label>Місто</label><input type="text" id="city" placeholder="Київ"></div>
            
            <div class="input-group"><label>Тип доставки</label>
                <div class="delivery-options">
                    <div id="type-branch" class="delivery-btn active" onclick="setDelivery('Відділення')">Відділення</div>
                    <div id="type-post" class="delivery-btn" onclick="setDelivery('Поштомат')">Поштомат</div>
                </div>
            </div>
            
            <div class="input-group"><label id="np-label">Номер відділення</label><input type="text" id="np-number" placeholder="№1"></div>
            
            <div class="payment-info">✓ Оплата при отриманні на пошті</div>
            
            <button class="submit-order" onclick="sendOrder()">ПІДТВЕРДИТИ ЗАМОВЛЕННЯ</button>
            <p onclick="closeModal()" style="text-align:center; color:#444; margin-top:15px; cursor:pointer; font-weight:bold;">Скасувати</p>
        </div>
    </div>

    <div id="cart-panel" onclick="openOrderForm()">
        <span id="cart-count">0 ПАР</span>
        <span>ОФОРМИТИ ЗАМОВЛЕННЯ ➔</span>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active" onclick="location.reload()"><span>🏠</span>Головна</a>
        <a href="https://t.me/znahidkawow" target="_blank" class="nav-item"><span>💬</span>Контакти</a>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyrUdnnLYx_KI10S37364wUpWIq-H6csDLHguVjOTjnfjWSncS9Q63A1xv8-sS0E4XpzA/exec';
        let allProducts = [], cart = [], selectedSizes = {}, currentDelivery = 'Відділення';

        async function loadStore() {
            const res = await fetch(GOOGLE_SCRIPT_URL);
            allProducts = await res.json();
            renderProducts(allProducts);
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function renderProducts(products) {
            document.getElementById('catalog').innerHTML = products.map(p => {
                const sizesHtml = p.sizes.map(s => 
                    `<button class="size-btn ${selectedSizes[p.name] === s ? 'selected' : ''}" onclick="selectSize(this, '${p.name}', '${s}')">${s}</button>`
                ).join('');
                return `<div class="product-card">
                    <div class="img-container"><img src="${p.image}" loading="lazy"></div>
                    <div class="card-info">
                        <div class="title">${p.name}</div>
                        <div class="sizes-container">${sizesHtml}</div>
                        <div class="price-row">
                            <div class="price">${p.price} ₴</div>
                            <button class="add-btn" onclick="addToCart('${p.name}', '${p.price}')">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function selectSize(btn, name, size) {
            selectedSizes[name] = size;
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function addToCart(name, price) {
            if (!selectedSizes[name]) { alert("Спершу оберіть свій розмір!"); return; }
            cart.push({ name: `${name} (Розмір: ${selectedSizes[name]})`, price: price });
            document.getElementById('cart-panel').style.display = 'flex';
            document.getElementById('cart-count').innerText = cart.length + ' ПАР';
        }

        function setDelivery(type) {
            currentDelivery = type;
            document.getElementById('type-branch').classList.toggle('active', type === 'Відділення');
            document.getElementById('type-post').classList.toggle('active', type === 'Поштомат');
            document.getElementById('np-label').innerText = type === 'Відділення' ? 'Номер відділення' : 'Номер поштомату';
        }

        function openOrderForm() { document.getElementById('order-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

        function sendOrder() {
            const fio = document.getElementById('fio').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const city = document.getElementById('city').value.trim();
            const np = document.getElementById('np-number').value.trim();

            if (!fio || !phone || !city || !np) { alert("Будь ласка, заповніть усі поля!"); return; }

            const total = cart.reduce((s, i) => s + parseInt(i.price), 0);
            
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ 
                    productName: cart.map(i => i.name).join(', '), 
                    price: total + " ₴", 
                    fio: fio, phone: phone, city: city, 
                    deliveryType: currentDelivery, npNumber: np 
                })
            }).then(() => { alert("Замовлення прийнято! Чекайте на дзвінок."); location.reload(); });
        }
        loadStore();
    </script>
</body>
</html>
