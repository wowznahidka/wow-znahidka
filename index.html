<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wow.znahidka</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 110px; }
        
        header { position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); padding: 18px 15px; text-align: center; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .search-container { padding: 15px; }
        .search-bar { width: 100%; padding: 14px 20px; border-radius: 16px; border: 1px solid #222; background: #1a1a1a; color: #fff; outline: none; font-size: 1rem; }

        .page { display: none; }
        .active-page { display: block; }

        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px 15px; }
        .product-card { background: var(--card); border-radius: 22px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; }
        
        /* КОНТЕЙНЕР ФОТО */
        .img-container { background: #1a1a1a; position: relative; aspect-ratio: 1/1; overflow: hidden; cursor: zoom-in; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .img-container:active img { transform: scale(1.05); }

        .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; line-height: 1.3; height: 2.6em; overflow: hidden; color: #eee; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: var(--accent); font-weight: 900; font-size: 1.1rem; }
        .add-btn { background: var(--accent); border: none; width: 38px; height: 38px; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; }

        /* ВЕЛИКЕ ВІКНО ZOOM */
        #zoom-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 10px; }
        #zoom-modal img { max-width: 100%; max-height: 90vh; border-radius: 15px; object-fit: contain; }
        .close-zoom { position: absolute; top: 30px; right: 25px; color: #fff; font-size: 2.5rem; font-weight: bold; cursor: pointer; line-height: 1; }

        .load-more-btn { display: none; width: calc(100% - 20px); margin: 10px; background: #1a1a1a; color: #fff; padding: 15px; border-radius: 14px; text-align: center; border: 1px solid #333; font-weight: bold; }

        #cart-panel { position: fixed; bottom: 85px; left: 15px; right: 15px; background: var(--accent); color: #000; padding: 18px 20px; border-radius: 20px; display: none; justify-content: space-between; font-weight: 900; z-index: 200; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 10px 25px; border-top: 1px solid #1a1a1a; z-index: 300; }
        .nav-item { color: #666; text-decoration: none; font-size: 0.75rem; text-align: center; font-weight: bold; cursor: pointer; }
        .nav-item span { display: block; font-size: 1.4rem; margin-bottom: 5px; }
        .nav-item.active { color: var(--accent); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: #111; padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; border: 1px solid #222; }
        .modal-content input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
        .delivery-toggle { display: flex; gap: 10px; margin-bottom: 12px; }
        .delivery-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 14px; border-radius: 14px; flex: 1; text-align: center; font-weight: bold; cursor: pointer; }
        .delivery-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,255,0,0.05); }
        
        .payment-card { background: rgba(212,255,0,0.05); border: 1px dashed var(--accent); border-radius: 18px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; font-size: 0.8rem; line-height: 1.4; color: #bbb; }
        .payment-card b { color: var(--accent); display: block; }
    </style>
</head>
<body>

    <header><div class="logo">WOW<span>.</span>ZNAHIDKA</div></header>

    <div id="page-home" class="page active-page">
        <div class="search-container"><input type="text" class="search-bar" id="search-input" placeholder="Пошук моделі..." oninput="handleSearch()"></div>
        <div id="grid-home" class="catalog-grid"></div>
        <div id="load-more-home" class="load-more-btn" onclick="loadMore('home')">Показати ще</div>
    </div>

    <div id="page-catalog" class="page">
        <div id="brand-container" class="brand-list" style="padding: 15px; display: grid; gap: 12px;"></div>
    </div>

    <div id="page-brand-results" class="page">
        <div style="padding: 15px; display: flex; align-items: center; gap: 15px;">
            <button onclick="switchTab('catalog')" style="background:none; border:none; color:var(--accent); font-size:1.5rem;">←</button>
            <h2 id="brand-title" style="margin:0;"></h2>
        </div>
        <div id="grid-brand" class="catalog-grid"></div>
        <div id="load-more-brand" class="load-more-btn" onclick="loadMore('brand')">Показати ще</div>
    </div>

    <div id="zoom-modal" onclick="this.style.display='none'">
        <span class="close-zoom">&times;</span>
        <img id="zoomed-img" src="">
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h3>Оформлення</h3>
            <input type="text" id="fio" placeholder="Ваше ПІБ">
            <input type="tel" id="phone" placeholder="Ваш телефон">
            <input type="text" id="city" placeholder="Місто">
            <input type="text" id="social-nick" placeholder="Telegram / Instagram @нік">
            <div class="delivery-toggle">
                <div id="type-branch" class="delivery-btn active" onclick="setDelivery('Відділення')">Відділення</div>
                <div id="type-post" class="delivery-btn" onclick="setDelivery('Поштомат')">Поштомат</div>
            </div>
            <input type="text" id="np-number" placeholder="№ відділення/поштомату">
            <div class="payment-card">
                <span>📦</span>
                <p><b>Оплата при отриманні</b>Накладений платіж «Нова Пошта». Огляньте перед оплатою.</p>
            </div>
            <button id="submit-order-btn" onclick="sendOrder()" style="width:100%; background:var(--accent); color:#000; padding:18px; border:none; border-radius:14px; font-weight:900;">ПІДТВЕРДИТИ</button>
            <p onclick="closeModals()" style="text-align:center; color:#666; margin-top:15px; cursor:pointer;">Скасувати</p>
        </div>
    </div>

    <div id="cart-panel" onclick="openOrderForm()">
        <span id="cart-count">0 ТОВАРІВ</span>
        <span>ОФОРМИТИ ➔</span>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span>🏠</span>Головна</div>
        <div class="nav-item" id="nav-catalog" onclick="switchTab('catalog')"><span>👟</span>Каталог</div>
        <div id="contacts-trigger" class="nav-item" onclick="alert('TG: @znahidkawow\nIG: @wow.znahidka')"><span>💬</span>Контакти</div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOrpI1ESu71wfiV4ThsUX_nVbXpkmfChj-px5UnlSDkTOeg24EdG2TmF4rsBnmuED9sA/exec';
        let allProducts = [], cart = [], selectedSizes = {}, currentDelivery = 'Відділення';
        const ITEMS_PER_PAGE = 10;
        let currentPageHome = 1, currentPageBrand = 1, currentBrandData = [];

        async function init() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                allProducts = await res.json();
                renderCards(allProducts.slice(0, ITEMS_PER_PAGE), 'grid-home');
                checkLoadMore('home', allProducts.length, currentPageHome);
                renderBrands();
            } catch (e) { console.error(e); }
        }

        function renderCards(products, containerId, append = false) {
            const container = document.getElementById(containerId);
            const html = products.map(p => {
                const firstImg = p.image.split(',')[0].trim();
                const sizesHtml = p.sizes.map(s => `<button class="size-btn ${selectedSizes[p.id] === s ? 'selected' : ''}" onclick="pickSize(this, '${p.id}', '${s}')">${s}</button>`).join('');
                return `
                <div class="product-card">
                    <div class="img-container" onclick="openZoom('${firstImg}')">
                        <img src="${firstImg}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <div class="title">${p.name}</div>
                        <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px;">${sizesHtml}</div>
                        <div class="price-row">
                            <div class="price">${p.price} ₴</div>
                            <button class="add-btn" onclick="addToCart('${p.id}', '${p.name}', '${p.price}')">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            if (append) container.innerHTML += html;
            else container.innerHTML = html;
        }

        function openZoom(src) {
            document.getElementById('zoomed-img').src = src;
            document.getElementById('zoom-modal').style.display = 'flex';
        }

        function loadMore(type) {
            if (type === 'home') {
                currentPageHome++;
                const start = (currentPageHome - 1) * ITEMS_PER_PAGE;
                renderCards(allProducts.slice(start, start + ITEMS_PER_PAGE), 'grid-home', true);
                checkLoadMore('home', allProducts.length, currentPageHome);
            } else {
                currentPageBrand++;
                const start = (currentPageBrand - 1) * ITEMS_PER_PAGE;
                renderCards(currentBrandData.slice(start, start + ITEMS_PER_PAGE), 'grid-brand', true);
                checkLoadMore('brand', currentBrandData.length, currentPageBrand);
            }
        }

        function checkLoadMore(type, total, current) {
            const btn = document.getElementById(`load-more-${type}`);
            btn.style.display = (total > current * ITEMS_PER_PAGE) ? 'block' : 'none';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + tabId).classList.add('active-page');
            document.getElementById('nav-' + tabId)?.classList.add('active');
            window.scrollTo(0,0);
        }

        function openBrand(brand) {
            currentPageBrand = 1;
            currentBrandData = allProducts.filter(p => p.brand === brand);
            document.getElementById('brand-title').innerText = brand;
            renderCards(currentBrandData.slice(0, ITEMS_PER_PAGE), 'grid-brand');
            checkLoadMore('brand', currentBrandData.length, currentPageBrand);
            switchTab('brand-results');
        }

        function renderBrands() {
            const brands = [...new Set(allProducts.map(p => p.brand))].filter(Boolean);
            document.getElementById('brand-container').innerHTML = brands.map(b => `<div class="brand-item" onclick="openBrand('${b}')">${b} <span>➔</span></div>`).join('');
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            renderCards(filtered.slice(0, ITEMS_PER_PAGE), 'grid-home');
            checkLoadMore('home', filtered.length, 1);
            currentPageHome = 1;
        }

        function pickSize(btn, id, size) {
            selectedSizes[id] = size;
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function addToCart(id, name, price) {
            if (!selectedSizes[id]) { alert("Оберіть розмір!"); return; }
            cart.push({ name: `${name} (${selectedSizes[id]})`, price });
            document.getElementById('cart-panel').style.display = 'flex';
            document.getElementById('cart-count').innerText = cart.length + " ТОВАР(ІВ)";
        }

        function setDelivery(t) { currentDelivery = t; document.getElementById('type-branch').classList.toggle('active', t==='Відділення'); document.getElementById('type-post').classList.toggle('active', t==='Поштомат'); }
        function openOrderForm() { document.getElementById('order-modal').style.display = 'flex'; }
        function closeModals() { document.getElementById('order-modal').style.display = 'none'; }

        function sendOrder() {
            const fio = document.getElementById('fio').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const city = document.getElementById('city').value.trim();
            if (!fio || !phone || !city) { alert("Заповніть поля!"); return; }
            const btn = document.getElementById('submit-order-btn');
            btn.innerText = "ВІДПРАВЛЯЄМО..."; btn.disabled = true;
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ 
                    productName: cart.map(i => i.name).join(' | '), 
                    price: cart.reduce((s, i) => s + parseInt(i.price), 0) + " ₴", 
                    fio: `${fio} (${document.getElementById('social-nick').value})`, phone, city, deliveryType: currentDelivery, npNumber: document.getElementById('np-number').value
                })
            }).then(() => { alert("Замовлення прийнято!"); location.reload(); });
        }

        init();
    </script>
</body>
</html>
