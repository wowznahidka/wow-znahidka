<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wow.znahidka</title>
    <style>
        :root { --accent: #d4ff00; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; }
        header { position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 15px; text-align: center; z-index: 100; border-bottom: 1px solid #222; }
        .search-container { padding: 10px; background: var(--bg); }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .product-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column; }
        .img-container img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 600; line-height: 1.3; height: 2.6em; overflow: hidden; margin-bottom: 8px; }
        .sizes-container { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
        .size-btn { background: #222; color: #fff; border: 1px solid #333; padding: 5px 8px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-weight: 800; color: var(--accent); font-size: 1rem; }
        .add-btn { background: var(--accent); border: none; width: 35px; height: 35px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        #cart-panel { position: fixed; bottom: 90px; left: 15px; right: 15px; background: var(--accent); color: #000; padding: 18px; border-radius: 18px; display: none; justify-content: space-between; font-weight: 900; z-index: 200; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #111; padding: 25px; border-radius: 25px; max-width: 400px; margin: 10% auto; border: 1px solid #333; }
        .modal-content input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        .order-btn { width: 100%; background: var(--accent); padding: 16px; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; font-size: 1rem; }
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(26,26,26,0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px; border-radius: 20px; border: 1px solid #333; z-index: 100; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>
    <header><b style="letter-spacing: 2px;">WOW.ZNAHIDKA</b></header>
    <div class="search-container"><input type="text" id="search-input" class="search-bar" placeholder="Пошук кросівок..." oninput="handleSearch()"></div>
    
    <div id="catalog" class="catalog-grid"></div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Оформлення</h2>
            <input type="text" id="fio" placeholder="ПІБ">
            <input type="tel" id="phone" placeholder="Номер телефону">
            <input type="text" id="city" placeholder="Місто">
            <input type="text" id="np" placeholder="№ Відділення Нової Пошти">
            <button class="order-btn" onclick="sendOrder()">ПІДТВЕРДИТИ</button>
            <p onclick="closeModal()" style="text-align:center; color:#555; margin-top:15px; cursor:pointer;">Назад</p>
        </div>
    </div>

    <div id="cart-panel" onclick="openOrderForm()">
        <span id="cart-count">0 ТОВАРІВ</span>
        <span>ЗАМОВИТИ ➔</span>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item" onclick="location.reload()" style="color:var(--accent)"><span>🏠</span>Головна</a>
        <a href="https://t.me/znahidkawow" target="_blank" class="nav-item"><span>💬</span>Контакти</a>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzeqGVRXib5baDd7A9ceM-GeP57QkbyaSSUk0dVl08Yd-rEkMPa4qhJQTWNbQ6vM5kNrw/exec';
        let allProducts = [], cart = [], selectedSizes = {};

        async function loadStore() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                allProducts = await res.json();
                renderProducts(allProducts);
            } catch (e) { alert("Помилка завантаження"); }
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function renderProducts(products) {
            document.getElementById('catalog').innerHTML = products.map(p => {
                const sizesHtml = p.sizes.map(s => 
                    `<button class="size-btn ${selectedSizes[p.name] === s ? 'selected' : ''}" onclick="selectSize(this, '${p.name}', '${s}')">${s}</button>`
                ).join('');
                return `
                <div class="product-card">
                    <div class="img-container"><img src="${p.image}" loading="lazy"></div>
                    <div class="card-info">
                        <div class="title">${p.name}</div>
                        <div class="sizes-container">${sizesHtml}</div>
                        <div class="price-row">
                            <div class="price">${p.price} ₴</div>
                            <button class="add-btn" onclick="addToCart('${p.name}', '${p.price}')">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function selectSize(btn, name, size) {
            selectedSizes[name] = size;
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function addToCart(name, price) {
            if (!selectedSizes[name]) { alert("Спершу оберіть розмір!"); return; }
            cart.push({ name: `${name} (Розмір: ${selectedSizes[name]})`, price: price });
            document.getElementById('cart-panel').style.display = 'flex';
            document.getElementById('cart-count').innerText = cart.length + ' ТОВ.';
        }

        function openOrderForm() { document.getElementById('order-modal').style.display = 'block'; }
        function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

        function sendOrder() {
            const fio = document.getElementById('fio').value;
            const phone = document.getElementById('phone').value;
            if (!fio || !phone) { alert("Заповніть контактні дані"); return; }
            
            const items = cart.map(i => i.name).join(', ');
            const total = cart.reduce((s, i) => s + parseInt(i.price), 0);
            
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({
                    productName: items,
                    price: total + " ₴",
                    contactInfo: `👤 ${fio}\n📞 ${phone}\n📍 ${document.getElementById('city').value}, НП ${document.getElementById('np').value}`
                })
            }).then(() => { alert("Замовлення надіслано в Telegram!"); location.reload(); });
        }
        loadStore();
    </script>
</body>
</html>
