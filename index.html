<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wow.znahidka</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        
        /* HEADER */
        header { position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); padding: 18px 15px; text-align: center; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .search-container { padding: 15px; }
        .search-bar { width: 100%; padding: 14px 20px; border-radius: 16px; border: 1px solid #222; background: #1a1a1a; color: #fff; outline: none; font-size: 1rem; }

        .page { display: none; }
        .active-page { display: block; }

        /* CATALOG */
        .brand-list { padding: 0 15px 15px; display: grid; grid-template-columns: 1fr; gap: 12px; }
        .brand-item { background: var(--card); padding: 22px; border-radius: 20px; border: 1px solid #222; font-weight: 800; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .brand-item span { color: var(--accent); }

        /* GRID & CARDS */
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px 15px; }
        .product-card { background: var(--card); border-radius: 22px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; }
        
        /* ОПТИМІЗАЦІЯ КАРТИНКИ */
        .img-container { background: #1a1a1a; position: relative; aspect-ratio: 1/1; overflow: hidden; }
        .img-container::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, #1f1f1f, transparent); animation: skeleton-blink 1.5s infinite; }
        .img-container.loaded::after { display: none; }
        
        .product-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s ease; }
        .product-card img.visible { opacity: 1; }

        @keyframes skeleton-blink { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; line-height: 1.3; height: 2.6em; overflow: hidden; color: #eee; }
        
        .sizes-container { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; min-height: 25px; }
        .size-btn { background: #1f1f1f; color: #aaa; border: 1px solid #333; padding: 6px 8px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: var(--accent); font-weight: 900; font-size: 1.1rem; }
        .add-btn { background: var(--accent); border: none; width: 38px; height: 38px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; color: #000; }

        /* NAV & CART */
        #cart-panel { position: fixed; bottom: 85px; left: 15px; right: 15px; background: var(--accent); color: #000; padding: 18px 20px; border-radius: 20px; display: none; justify-content: space-between; font-weight: 900; z-index: 200; box-shadow: 0 5px 25px rgba(212,255,0,0.2); cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 10px 25px; border-top: 1px solid #1a1a1a; z-index: 300; }
        .nav-item { color: #666; text-decoration: none; font-size: 0.75rem; text-align: center; font-weight: bold; cursor: pointer; }
        .nav-item span { display: block; font-size: 1.4rem; margin-bottom: 5px; }
        .nav-item.active { color: var(--accent); }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: #111; padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; border: 1px solid #222; }
        .modal-content h3 { margin-top: 0; font-size: 1.3rem; text-align: center; margin-bottom: 20px; }
        .modal-content input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 1rem; outline: none; }
        
        .delivery-toggle { display: flex; gap: 10px; margin-bottom: 12px; }
        .delivery-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 14px; border-radius: 14px; flex: 1; text-align: center; font-weight: bold; cursor: pointer; }
        .delivery-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,255,0,0.05); }

        .payment-card { background: rgba(212,255,0,0.05); border: 1px dashed var(--accent); border-radius: 18px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; }
        .payment-card span { font-size: 1.4rem; }
        .payment-card p { margin: 0; font-size: 0.8rem; color: #bbb; line-height: 1.4; }
        .payment-card b { color: var(--accent); display: block; }

        .social-link { display: flex; align-items: center; gap: 15px; background: #1a1a1a; padding: 16px; border-radius: 18px; text-decoration: none; color: #fff; font-weight: bold; margin-bottom: 10px; border: 1px solid #222; }
        .social-link.tg { border-left: 4px solid #24A1DE; }
        .social-link.ig { border-left: 4px solid #E1306C; }
        .social-link.tt { border-left: 4px solid #fff; }

        .close-btn { text-align: center; color: #666; margin-top: 15px; cursor: pointer; font-weight: bold; display: block; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header><div class="logo">WOW<span>.</span>ZNAHIDKA</div></header>

    <div id="page-home" class="page active-page">
        <div class="search-container"><input type="text" class="search-bar" id="search-input" placeholder="Пошук моделі..." oninput="handleSearch()"></div>
        <div id="grid-home" class="catalog-grid"></div>
    </div>

    <div id="page-catalog" class="page">
        <h2 style="padding: 0 15px; margin-top: 20px;">Обери бренд</h2>
        <div id="brand-container" class="brand-list"></div>
    </div>

    <div id="page-brand-results" class="page">
        <div style="padding: 15px; display: flex; align-items: center; gap: 15px;">
            <button onclick="switchTab('catalog')" style="background:none; border:none; color:var(--accent); font-size:1.5rem; font-weight:bold;">←</button>
            <h2 id="brand-title" style="margin:0;"></h2>
        </div>
        <div id="grid-brand" class="catalog-grid"></div>
    </div>

    <div id="contacts-modal" class="modal">
        <div class="modal-content">
            <h3>Зв'язок з нами</h3>
            <a href="https://t.me/znahidkawow" target="_blank" class="social-link tg">✈️ Telegram</a>
            <a href="https://www.instagram.com/wow.znahidka" target="_blank" class="social-link ig">📸 Instagram</a>
            <a href="https://www.tiktok.com/@wow.znahidka" target="_blank" class="social-link tt">🎵 TikTok</a>
            <span class="close-btn" onclick="closeModals()">Закрити</span>
        </div>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h3>Оформлення</h3>
            <input type="text" id="fio" placeholder="Ваше ПІБ">
            <input type="tel" id="phone" placeholder="Ваш телефон">
            <input type="text" id="city" placeholder="Місто / Населений пункт">
            <input type="text" id="social-nick" placeholder="Telegram / Instagram @нік">
            
            <div class="delivery-toggle">
                <div id="type-branch" class="delivery-btn active" onclick="setDelivery('Відділення')">Відділення</div>
                <div id="type-post" class="delivery-btn" onclick="setDelivery('Поштомат')">Поштомат</div>
            </div>
            <input type="text" id="np-number" placeholder="Номер відділення або поштомату">
            
            <div class="payment-card">
                <span>📦</span>
                <p><b>Накладений платіж</b>Оплата на пошті після огляду та примірки кросівок.</p>
            </div>
            
            <button id="submit-order-btn" onclick="sendOrder()" style="width:100%; background:var(--accent); color:#000; padding:18px; border:none; border-radius:14px; font-weight:900; font-size:1.1rem; margin-top:5px;">ПІДТВЕРДИТИ</button>
            <span class="close-btn" onclick="closeModals()">Скасувати</span>
        </div>
    </div>

    <div id="cart-panel" onclick="openOrderForm()">
        <span id="cart-count">0 ТОВАРІВ</span>
        <span>ОФОРМИТИ ➔</span>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span>🏠</span>Головна</div>
        <div class="nav-item" id="nav-catalog" onclick="switchTab('catalog')"><span>👟</span>Каталог</div>
        <div class="nav-item" onclick="openContacts()"><span>💬</span>Контакти</div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOrpI1ESu71wfiV4ThsUX_nVbXpkmfChj-px5UnlSDkTOeg24EdG2TmF4rsBnmuED9sA/exec';
        let allProducts = [], cart = [], selectedSizes = {}, currentDelivery = 'Відділення';

        async function init() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                allProducts = await res.json();
                renderCards(allProducts, 'grid-home');
                renderBrands();
            } catch (e) { console.error("Data error:", e); }
        }

        // ОПТИМІЗОВАНИЙ РЕНДЕР КАРТОЧОК
        function renderCards(products, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = products.map(p => {
                const sizesHtml = p.sizes.map(s => 
                    `<button class="size-btn ${selectedSizes[p.id] === s ? 'selected' : ''}" 
                     onclick="pickSize(this, '${p.id}', '${s}')">${s}</button>`
                ).join('');

                return `
                <div class="product-card">
                    <div class="img-container" id="cont-${p.id}">
                        <img src="${p.image}" 
                             loading="lazy" 
                             onload="this.classList.add('visible'); document.getElementById('cont-${p.id}').classList.add('loaded')">
                    </div>
                    <div class="card-info">
                        <div class="title">${p.name}</div>
                        <div class="sizes-container">${sizesHtml}</div>
                        <div class="price-row">
                            <div class="price">${p.price} ₴</div>
                            <button class="add-btn" onclick="addToCart('${p.id}', '${p.name}', '${p.price}')">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(tabId === 'home') {
                document.getElementById('page-home').classList.add('active-page');
                document.getElementById('nav-home').classList.add('active');
            } else if(tabId === 'catalog') {
                document.getElementById('page-catalog').classList.add('active-page');
                document.getElementById('nav-catalog').classList.add('active');
            }
            window.scrollTo(0,0);
        }

        function openBrand(brand) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-brand-results').classList.add('active-page');
            document.getElementById('brand-title').innerText = brand;
            renderCards(allProducts.filter(p => p.brand === brand), 'grid-brand');
        }

        function renderBrands() {
            const brands = [...new Set(allProducts.map(p => p.brand))].filter(Boolean);
            document.getElementById('brand-container').innerHTML = brands.map(b => 
                `<div class="brand-item" onclick="openBrand('${b}')">${b} <span>➔</span></div>`
            ).join('');
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            renderCards(allProducts.filter(p => p.name.toLowerCase().includes(query)), 'grid-home');
        }

        function pickSize(btn, id, size) {
            selectedSizes[id] = size;
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function addToCart(id, name, price) {
            if (!selectedSizes[id]) { alert("Спершу оберіть потрібний розмір!"); return; }
            cart.push({ name: `${name} (${selectedSizes[id]})`, price: price });
            document.getElementById('cart-panel').style.display = 'flex';
            document.getElementById('cart-count').innerText = cart.length + " ТОВАР(ІВ)";
        }

        function setDelivery(type) {
            currentDelivery = type;
            document.getElementById('type-branch').classList.toggle('active', type === 'Відділення');
            document.getElementById('type-post').classList.toggle('active', type === 'Поштомат');
        }

        function openOrderForm() { document.getElementById('order-modal').style.display = 'flex'; }
        function openContacts() { document.getElementById('contacts-modal').style.display = 'flex'; }
        function closeModals() { document.getElementById('order-modal').style.display = 'none'; document.getElementById('contacts-modal').style.display = 'none'; }

        function sendOrder() {
            const fio = document.getElementById('fio').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const city = document.getElementById('city').value.trim();
            const nick = document.getElementById('social-nick').value.trim();
            const np = document.getElementById('np-number').value.trim();
            
            if (!fio || !phone || !city || !np) { alert("Будь ласка, заповніть усі поля!"); return; }
            
            const btn = document.getElementById('submit-order-btn');
            btn.innerText = "ВІДПРАВЛЯЄМО...";
            btn.disabled = true;
            
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ 
                    productName: cart.map(i => i.name).join(' | '), 
                    price: cart.reduce((s, i) => s + parseInt(i.price), 0) + " ₴", 
                    fio: `${fio} (${nick})`, phone, city, deliveryType: currentDelivery, npNumber: np
                })
            }).then(() => { 
                alert("Дякуємо! Замовлення прийнято. Ми зв'яжемося з вами найближчим часом."); 
                location.reload(); 
            });
        }

        init();
    </script>
</body>
</html>
