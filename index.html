<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wow.znahidka — Магазин кросівок</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; --card: #121212; --border: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 110px; min-height: 100vh; overflow-x: hidden; }

        header { position: sticky; top: 0; background: rgba(5,5,5,0.85); backdrop-filter: blur(20px); padding: 20px 15px; text-align: center; z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .search-container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .search-bar { width: 100%; padding: 16px 20px; border-radius: 20px; border: 1px solid var(--border); background: #161616; color: #fff; outline: none; font-size: 1rem; }

        .page { display: none; max-width: 1400px; margin: 0 auto; }
        .active-page { display: block; }

        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px 20px; }
        @media (min-width: 768px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }

        .product-card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .img-container { position: relative; aspect-ratio: 1/1; background: #1a1a1a; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; line-height: 1.4; height: 2.8em; overflow: hidden; color: #fff; }

        .sizes-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .size-btn { background: #1a1a1a; color: #888; border: 1px solid #282828; padding: 7px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }
        .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: var(--accent); font-weight: 900; font-size: 1.15rem; }

        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .btn-qty { background: var(--accent); border: none; width: 38px; height: 38px; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .btn-minus { background: #222; color: #fff; border: 1px solid #333; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: #0f0f0f; padding: 30px 25px; border-radius: 32px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        .modal-content input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid var(--border); background: #161616; color: #fff; outline: none; font-size: 1rem; }

        .delivery-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .delivery-btn { background: #161616; border: 1px solid #333; color: #666; padding: 14px; border-radius: 14px; flex: 1; text-align: center; font-weight: 800; cursor: pointer; }
        .delivery-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,255,0,0.05); }

        .social-link { display: flex; align-items: center; gap: 15px; background: #161616; padding: 18px; border-radius: 20px; text-decoration: none; color: #fff; font-weight: 800; margin-bottom: 12px; border: 1px solid var(--border); }
        .social-link.tg { border-left: 5px solid #24A1DE; }
        .social-link.ig { border-left: 5px solid #E1306C; }
        .social-link.tt { border-left: 5px solid #fff; }

        #cart-panel { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 600px; background: var(--accent); color: #000; padding: 20px; border-radius: 22px; display: none; justify-content: space-between; font-weight: 900; z-index: 500; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 10px 30px; border-top: 1px solid var(--border); z-index: 600; }
        .nav-item { color: #555; text-decoration: none; font-size: 0.75rem; text-align: center; font-weight: 700; cursor: pointer; }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 6px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <header><div class="logo">WOW<span>.</span>ZNAHIDKA</div></header>

    <div id="page-home" class="page active-page">
        <div class="search-container"><input type="text" class="search-bar" id="search-input" placeholder="Пошук моделі..." oninput="handleSearch()"></div>
        <div id="grid-home" class="catalog-grid"></div>
        <div id="scroll-anchor" style="height: 50px;"></div>
    </div>

    <div id="contacts-modal" class="modal">
        <div class="modal-content">
            <h3>Зв'язок</h3>
            <a href="https://t.me/znahidkawow" target="_blank" class="social-link tg">✈️ Telegram</a>
            <a href="https://www.instagram.com/wow.znahidka/" target="_blank" class="social-link ig">📸 Instagram</a>
            <a href="https://www.tiktok.com/@wow.znahidka" target="_blank" class="social-link tt">🎵 TikTok</a>
            <span style="text-align:center; display:block; cursor:pointer; color:#555; margin-top:20px;" onclick="closeModals()">Закрити</span>
        </div>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content" id="modal-body">
            <div id="step-cart">
                <h3>Твій кошик</h3>
                <div id="cart-items-list" style="margin-bottom: 20px; max-height: 250px; overflow-y: auto;"></div>
                <div style="background: rgba(212,255,0,0.1); padding:15px; border-radius:15px; margin-bottom:15px; font-size:0.8rem;">
                    📦 <b>Оплата накладним платежем</b> при отриманні у відділенні Нової Пошти.
                </div>
                <button style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:16px; font-weight:900;" onclick="goToForm()">ДАЛІ ➔</button>
                <span style="text-align:center; display:block; margin-top:15px; cursor:pointer; color:#555;" onclick="closeModals()">Назад</span>
            </div>
            <div id="step-form" style="display:none;">
                <h3>Доставка</h3>
                <input type="text" id="fio" placeholder="ПІБ отримувача">
                <input type="tel" id="phone" placeholder="Номер телефону">
                <input type="text" id="city" placeholder="Місто">
                <input type="text" id="social-nick" placeholder="Нік Telegram / Instagram">
                <div class="delivery-toggle">
                    <div id="type-branch" class="delivery-btn active" onclick="setDelivery('Відділення')">Відділення</div>
                    <div id="type-post" class="delivery-btn" onclick="setDelivery('Поштомат')">Поштомат</div>
                </div>
                <input type="text" id="np-number" placeholder="№ відділення / поштомату">
                <input type="text" id="promo" placeholder="Промокод (якщо є)">
                <button id="submit-order-btn" onclick="sendOrder()" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:16px; font-weight:900;">ЗАМОВИТИ</button>
                <span style="text-align:center; display:block; margin-top:15px; cursor:pointer; color:#555;" onclick="backToCart()">← До списку</span>
            </div>
        </div>
    </div>

    <div id="cart-panel" onclick="openOrderForm()">
        <span id="cart-count">0 ПАР</span><span id="cart-total">ОФОРМИТИ ➔</span>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><span>🏠</span>Головна</div>
        <div class="nav-item" onclick="switchTab('catalog')"><span>👟</span>Каталог</div>
        <div class="nav-item" onclick="openContacts()"><span>💬</span>Контакти</div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwQHW-hLQbWxknZ1lnbykfLiVWzkQMqxHyZ4e4RbP2Nn7rPoCIeVqt4qcnsj3-82EDJ/exec';
        let allProducts = [], cart = [], selectedSizes = {}, itemsToShow = 12, currentDelivery = 'Відділення';

        async function init() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                allProducts = await res.json();
                allProducts.reverse();
                renderCards(allProducts.slice(0, itemsToShow), 'grid-home');
                new IntersectionObserver(e => { if(e[0].isIntersecting && itemsToShow < allProducts.length) { renderCards(allProducts.slice(itemsToShow, itemsToShow += 12), 'grid-home', true); } }).observe(document.getElementById('scroll-anchor'));
            } catch (e) { document.getElementById('scroll-anchor').innerText = "Помилка зв'язку."; }
        }

        function renderCards(products, containerId, append = false) {
            const h = products.map(p => {
                const img = p.image.split(',')[0].trim();
                const sz = p.sizes.split(',').map(s => `<button class="size-btn ${selectedSizes[p.id] === s.trim() ? 'selected' : ''}" onclick="pickSize(this,'${p.id}','${s.trim()}')">${s.trim()}</button>`).join('');
                const inCart = cart.filter(i => i.id === p.id).length;
                let btn = `<button class="btn-qty" onclick="addToCart('${p.id}')">+</button>`;
                if(inCart > 0) btn = `<div class="qty-controls"><button class="btn-qty btn-minus" onclick="removeFromCart('${p.id}')">−</button><button class="btn-qty" onclick="addToCart('${p.id}')">+</button></div>`;
                return `<div class="product-card"><div class="img-container"><img src="${img}"></div><div class="card-info"><div class="title">${p.name}</div><div class="sizes-container">${sz}</div><div class="price-row"><div class="price">${p.price} ₴</div><div id="act-${p.id}">${btn}</div></div></div></div>`;
            }).join('');
            document.getElementById(containerId).innerHTML = append ? document.getElementById(containerId).innerHTML + h : h;
        }

        function pickSize(b, id, s) { selectedSizes[id] = s; b.parentElement.querySelectorAll('.size-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); }
        
        function addToCart(id) {
            if(!selectedSizes[id]) return alert("Обери розмір!");
            const p = allProducts.find(x => x.id === id);
            cart.push({...p, size: selectedSizes[id]});
            updateUI(id); updateCartPanel();
        }

        function removeFromCart(id) {
            const idx = cart.map(i => i.id).lastIndexOf(id);
            if(idx !== -1) cart.splice(idx, 1);
            updateUI(id); updateCartPanel();
        }

        function updateUI(id) {
            const count = cart.filter(i => i.id === id).length;
            const cont = document.getElementById(`act-${id}`);
            if(count > 0) cont.innerHTML = `<div class="qty-controls"><button class="btn-qty btn-minus" onclick="removeFromCart('${id}')">−</button><button class="btn-qty" onclick="addToCart('${id}')">+</button></div>`;
            else cont.innerHTML = `<button class="btn-qty" onclick="addToCart('${id}')">+</button>`;
        }

        function getDeclension(n) {
            if (n % 10 === 1 && n % 100 !== 11) return "ПАРА";
            if ([2, 3, 4].includes(n % 10) && ![12, 13, 14].includes(n % 100)) return "ПАРИ";
            return "ПАР";
        }

        function updateCartPanel() {
            const p = document.getElementById('cart-panel');
            if(cart.length) {
                p.style.display = 'flex';
                document.getElementById('cart-count').innerText = `${cart.length} ${getDeclension(cart.length)}`;
                document.getElementById('cart-total').innerText = `${cart.reduce((s, x) => s + parseInt(x.price), 0)} ₴ ➔`;
            } else p.style.display = 'none';
        }

        function openOrderForm() {
            document.getElementById('cart-items-list').innerHTML = cart.map(i => `<div style="padding:10px;background:#161616;margin-bottom:5px;border-radius:10px;">${i.name} (р. ${i.size})</div>`).join('');
            document.getElementById('order-modal').style.display = 'flex';
        }

        async function sendOrder() {
    const d = { 
        action: "new_order", 
        fio: document.getElementById('fio').value, 
        phone: document.getElementById('phone').value,
        city: document.getElementById('city').value,
        socialNick: document.getElementById('social-nick').value,
        deliveryType: currentDelivery,
        npNumber: document.getElementById('np-number').value,
        items: cart.map(i => `${i.name} (${i.size})`).join(', '),
        total: cart.reduce((s, x) => s + parseInt(x.price), 0),
        promo: document.getElementById('promo').value
    };

    if(!d.fio || !d.phone) return alert("Заповни дані!");
    document.getElementById('submit-order-btn').innerText = "ОБРОБКА...";

    try {
        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(d) });
        document.getElementById('modal-body').innerHTML = `
            <div style="text-align:center; padding: 40px 0;">
                <span style="font-size: 5rem;">✅</span>
                <h2 style="color:var(--accent); margin-top:20px;">ПРИЙНЯТО!</h2>
                <p style="color:#888; margin-bottom:30px;">Бот уже сповістив Машу. Чекайте на дзвінок!</p>
                <button style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:16px; font-weight:900;" onclick="location.reload()">ОК</button>
            </div>`;
    } catch (e) {
        alert("Помилка! Спробуй ще раз.");
        document.getElementById('submit-order-btn').innerText = "ЗАМОВИТИ";
    }
}
            if(!d.fio || !d.phone) return alert("Заповни дані!");
            
            document.getElementById('submit-order-btn').innerText = "ОБРОБКА...";
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(d) });
            
            // ЕКРАН УСПІХУ (Замість window.open)
            document.getElementById('modal-body').innerHTML = `
                <div style="text-align:center; padding: 40px 0;">
                    <span style="font-size: 5rem;">✅</span>
                    <h2 style="color:var(--accent); margin-top:20px;">ЗАМОВЛЕННЯ ПРИЙНЯТО!</h2>
                    <p style="color:#888; margin-bottom:30px;">Менеджер зв'яжеться з вами найближчим часом для підтвердження.</p>
                    <button style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:16px; font-weight:900;" onclick="location.reload()">ПОВЕРНУТИСЬ В МАГАЗИН</button>
                </div>
            `;
        }

        function goToForm() { document.getElementById('step-cart').style.display='none'; document.getElementById('step-form').style.display='block'; }
        function backToCart() { document.getElementById('step-form').style.display='none'; document.getElementById('step-cart').style.display='block'; }
        function closeModals() { document.getElementById('order-modal').style.display = 'none'; document.getElementById('contacts-modal').style.display = 'none'; }
        function openContacts() { document.getElementById('contacts-modal').style.display = 'flex'; }
        function setDelivery(t) { currentDelivery = t; document.getElementById('type-branch').classList.toggle('active', t==='Відділення'); document.getElementById('type-post').classList.toggle('active', t==='Поштомат'); }

        init();
    </script>
</body>
</html>
