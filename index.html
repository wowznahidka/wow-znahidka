<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wow.znahidka</title>
    <style>
        :root { --accent: #d4ff00; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; }
        header { position: sticky; top: 0; background: #000; padding: 15px; text-align: center; border-bottom: 1px solid #222; z-index: 100; }
        .search-container { padding: 10px; position: sticky; top: 52px; background: #000; z-index: 99; }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; outline: none; }
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .product-card { background: #111; border-radius: 20px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; }
        .img-container img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; line-height: 1.2; height: 2.4em; overflow: hidden; }
        .sizes-container { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .size-btn { background: #222; color: #fff; border: 1px solid #333; padding: 5px 7px; border-radius: 7px; font-size: 0.7rem; cursor: pointer; }
        .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { color: var(--accent); font-weight: 900; }
        .add-btn { background: var(--accent); border: none; padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #cart-panel { position: fixed; bottom: 85px; left: 15px; right: 15px; background: var(--accent); color: #000; padding: 15px; border-radius: 15px; display: none; justify-content: space-between; font-weight: bold; z-index: 200; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; z-index: 300; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.8rem; text-align: center; }
        .nav-item span { display: block; font-size: 1.2rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; max-width: 400px; margin: 15% auto; border: 1px solid #333; }
        .modal-content input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>
    <header><b>WOW.ZNAHIDKA</b></header>
    <div class="search-container"><input type="text" id="search-input" class="search-bar" placeholder="Пошук моделі..." oninput="handleSearch()"></div>
    <div id="catalog" class="catalog-grid"></div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h3>Оформлення</h3>
            <input type="text" id="fio" placeholder="ПІБ">
            <input type="tel" id="phone" placeholder="Телефон">
            <input type="text" id="city" placeholder="Місто">
            <input type="text" id="np" placeholder="№ Відділення НП">
            <button onclick="sendOrder()" style="width:100%; background:var(--accent); padding:15px; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">ПІДТВЕРДИТИ</button>
            <p onclick="closeModal()" style="text-align:center; color:#555; margin-top:15px; cursor:pointer;">Назад</p>
        </div>
    </div>

    <div id="cart-panel" onclick="openOrderForm()">
        <span id="cart-count">0 ТОВАРІВ</span>
        <span>ОФОРМИТИ ➔</span>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item" onclick="location.reload()"><span>🏠</span>Головна</a>
        <a href="https://t.me/znahidkawow" target="_blank" class="nav-item"><span>💬</span>Контакти</a>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVJ3xp7g9qE5Pl9EfUGDq0YtftRryLFJ7HGUYQ1rb7EADwCaqAqYguN47MWT8XTb5sbA/exec';
        let allProducts = [], cart = [], selectedSizes = {};

        async function loadStore() {
            const res = await fetch(GOOGLE_SCRIPT_URL);
            allProducts = await res.json();
            renderProducts(allProducts);
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function renderProducts(products) {
            document.getElementById('catalog').innerHTML = products.map(p => {
                const sizesHtml = p.sizes.map(s => 
                    `<button class="size-btn ${selectedSizes[p.name] === s ? 'selected' : ''}" onclick="selectSize(this, '${p.name}', '${s}')">${s}</button>`
                ).join('');
                return `
                <div class="product-card">
                    <div class="img-container"><img src="${p.image}" loading="lazy"></div>
                    <div class="card-info">
                        <div class="title">${p.name}</div>
                        <div class="sizes-container">${sizesHtml}</div>
                        <div class="price-row">
                            <div class="price">${p.price} ₴</div>
                            <button class="add-btn" onclick="addToCart('${p.name}', '${p.price}')">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function selectSize(btn, name, size) {
            selectedSizes[name] = size;
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function addToCart(name, price) {
            if (!selectedSizes[name]) { alert("Оберіть розмір!"); return; }
            cart.push({ name: `${name} (${selectedSizes[name]})`, price: price });
            document.getElementById('cart-panel').style.display = 'flex';
            document.getElementById('cart-count').innerText = cart.length + ' ТОВАРІВ';
        }

        function openOrderForm() { document.getElementById('order-modal').style.display = 'block'; }
        function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

        function sendOrder() {
            const fio = document.getElementById('fio').value;
            const phone = document.getElementById('phone').value;
            if (!fio || !phone) { alert("Заповніть дані"); return; }
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ 
                    productName: cart.map(i => i.name).join(', '), 
                    price: cart.reduce((s, i) => s + parseInt(i.price), 0) + " ₴", 
                    contactInfo: `👤 ${fio}, 📞 ${phone}, 📍 ${document.getElementById('city').value}, НП ${document.getElementById('np').value}` 
                })
            }).then(() => { alert("Замовлення надіслано!"); location.reload(); });
        }
        loadStore();
    </script>
</body>
</html>
