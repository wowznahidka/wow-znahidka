<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>WOW.ZNAHIDKA — Офлайн</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d0d0d;color:#fff;font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center;gap:0}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:.1em;color:#fff;margin-bottom:40px}
.logo span{color:#ff3e3e}
.icon{font-size:64px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(28px,8vw,42px);letter-spacing:.02em;text-transform:uppercase;line-height:1;margin-bottom:10px}
p{font-size:14px;color:rgba(255,255,255,.55);max-width:280px;line-height:1.5;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:#ff3e3e;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:.06em;text-transform:uppercase;border-radius:100px;border:none;cursor:pointer;text-decoration:none;transition:opacity .15s}
.btn:active{opacity:.8}
.trust{display:flex;gap:16px;margin-top:40px;flex-wrap:wrap;justify-content:center}
.trust-item{font-size:11px;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:5px}
.trust-item::before{content:'✓';color:#ff3e3e;font-weight:700}
</style>
</head>
<body>
  <div class="logo">WOW<span>.</span>ZNAHIDKA</div>
  <div class="icon">📡</div>
  <h1>Немає зв'язку</h1>
  <p>Перевір підключення до інтернету та спробуй ще раз</p>
  <button class="btn" onclick="window.location.reload()">↻ Спробувати знову</button>
  <div class="trust">
    <span class="trust-item">0₴ передоплати</span>
    <span class="trust-item">Оригінал</span>
    <span class="trust-item">1–3 дні доставка</span>
  </div>
</body>
</html>
